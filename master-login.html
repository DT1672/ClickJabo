<!DOCTYPE html>
<html>

<head>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Master Login
</title>

<link
rel="stylesheet"
href="admin.css">

</head>

<body>

<div class="login-container">

  <div class="login-card">

    <h1>
      ClickJabo
    </h1>

    <p class="sub-text">

      MASTER ACCESS

    </p>

    <div class="login-form">

      <label>
        Email
      </label>

      <input
      type="email"
      id="masterEmail"
      placeholder="Enter email">

      <label>
        Password
      </label>

      <input
      type="password"
      id="masterPassword"
      placeholder="Enter password">

      <button
      onclick="loginMaster()">

        Login

      </button>

    </div>

  </div>

</div>

<script type="module">

import {
  auth,
  db
}
from "./firebase-config.js";

import {

  signInWithEmailAndPassword

}
from "https://www.gstatic.com/firebasejs/12.3.0/firebase-auth.js";

import {

  doc,
  getDoc

}
from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

async function loginMaster(){

  const email =

  document.getElementById(
    "masterEmail"
  ).value.trim();

  const password =

  document.getElementById(
    "masterPassword"
  ).value.trim();

  try{

    const userCredential =

    await signInWithEmailAndPassword(

      auth,
      email,
      password

    );

    const masterDoc =

    await getDoc(

      doc(
        db,
        "masterAdmins",
        "master"
      )

    );

    if(!masterDoc.exists()){

      alert(
        "Master profile not found."
      );

      return;

    }

    const masterData =
    masterDoc.data();

    if(
      masterData.role !==
      "master"
    ){

      alert(
        "Unauthorized access."
      );

      return;

    }

    localStorage.setItem(
      "masterLoggedIn",
      "true"
    );

    window.location.href =
    "master-dashboard.html";

  }

  catch(error){

    console.log(error);

    alert(
      "Invalid login."
    );

  }

}

window.loginMaster =
loginMaster;

</script>

</body>

</html>
