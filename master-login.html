<!DOCTYPE html>
<html>

<head>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Master Login
</title>

<link
rel="stylesheet"
href="admin.css">

<style>

.page-loader{

  position:fixed;

  top:0;
  left:0;

  width:100%;
  height:100%;

  background:
  rgba(2,8,23,.72);

  backdrop-filter:blur(6px);

  display:none;

  justify-content:center;
  align-items:center;

  z-index:99999;

}

.loader-spinner{

  width:62px;
  height:62px;

  border-radius:50%;

  border:
  4px solid rgba(255,255,255,.08);

  border-top:
  4px solid #c29b47;

  animation:
  spin .8s linear infinite;

}

@keyframes spin{

  from{

    transform:
    rotate(0deg);

  }

  to{

    transform:
    rotate(360deg);

  }

}

</style>

</head>

<body>

<!-- LOADER -->

<div
class="page-loader"
id="globalLoader">

  <div
  class="loader-spinner">

  </div>

</div>

<div class="login-container">

  <div class="login-card">

    <h1>
      ClickJabo
    </h1>

    <p class="sub-text">

      MASTER ACCESS

    </p>

    <div class="login-form">

      <label>
        Email
      </label>

      <input
      type="email"
      id="masterEmail"
      placeholder="Enter email">

      <label>
        Password
      </label>

      <input
      type="password"
      id="masterPassword"
      placeholder="Enter password">

      <button
      onclick="loginMaster()">

        Login

      </button>

    </div>

  </div>

</div>

<script type="module">

import {
  auth,
  db
}
from "./firebase-config.js";

import {

  signInWithEmailAndPassword

}
from "https://www.gstatic.com/firebasejs/12.3.0/firebase-auth.js";

import {

  doc,
  getDoc

}
from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

/* =========================
   LOADER
========================= */

function showLoader(){

  document.getElementById(
    "globalLoader"
  ).style.display =

  "flex";

}

function hideLoader(){

  document.getElementById(
    "globalLoader"
  ).style.display =

  "none";

}

/* =========================
   LOGIN
========================= */

async function loginMaster(){

  showLoader();

  const email =

  document.getElementById(
    "masterEmail"
  ).value.trim();

  const password =

  document.getElementById(
    "masterPassword"
  ).value.trim();

  if(

    email === "" ||

    password === ""

  ){

    hideLoader();

    alert(
      "Please enter email and password."
    );

    return;

  }

  try{

    const userCredential =

    await signInWithEmailAndPassword(

      auth,
      email,
      password

    );

    const masterDoc =

    await getDoc(

      doc(
        db,
        "masterAdmins",
        "master"
      )

    );

    if(!masterDoc.exists()){

      hideLoader();

      alert(
        "Master profile not found."
      );

      return;

    }

    const masterData =
    masterDoc.data();

    if(
      masterData.role !==
      "master"
    ){

      hideLoader();

      alert(
        "Unauthorized access."
      );

      return;

    }

    localStorage.setItem(
      "masterLoggedIn",
      "true"
    );

    window.location.href =
    "master-dashboard.html";

  }

  catch(error){

    hideLoader();

    console.log(error);

    alert(
      "Invalid login."
    );

  }

}

window.loginMaster =
loginMaster;

</script>

</body>

</html>
