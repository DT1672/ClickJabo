}
from "https://www.gstatic.com/firebasejs/12.3.0/firebase-storage.js";



const storage =
getStorage();

/* =========================
   COMPRESS IMAGE
========================= */

async function compressImage(file){

  return new Promise(resolve => {

    const image =
    new Image();

    image.src =
    URL.createObjectURL(file);

    image.onload = () => {

      const canvas =
      document.createElement(
        "canvas"
      );

      const maxWidth =
      1334;

      const maxHeight =
      760;

      let width =
      image.width;

      let height =
      image.height;

      if(width > maxWidth){

        height *=
        maxWidth / width;

        width =
        maxWidth;

      }

      if(height > maxHeight){

        width *=
        maxHeight / height;

        height =
        maxHeight;

      }

      canvas.width =
      width;

      canvas.height =
      height;

      const ctx =
      canvas.getContext(
        "2d"
      );

      ctx.drawImage(

        image,
        0,
        0,
        width,
        height

      );

      canvas.toBlob(

        blob => {

          resolve(blob);

        },

        "image/webp",

        0.72

      );

    };

  });

}

let editingSponsorId =
null;

/* =========================
   LOADER
========================= */

function showLoader(){

  document.getElementById(
    "globalLoader"
  ).style.display =

  "flex";

}

function hideLoader(){

  document.getElementById(
    "globalLoader"
  ).style.display =

  "none";

}

/* =========================
   SAVE SPONSOR
========================= */

async function saveSponsor(){

  try{

    showLoader();

    const title =

    document.getElementById(
      "sponsorTitle"
    ).value.trim();

    const imageFile =

    document.getElementById(
      "sponsorImage"
    ).files[0];

    /* =========================
FILE VALIDATION
========================= */

if(imageFile){

const allowedTypes = [


"image/png",
"image/jpeg",
"image/webp"


];

if(


!allowedTypes.includes(
  imageFile.type
)


){


hideLoader();

alert(
  "Only PNG, JPG, or WEBP images are allowed."
);

return;


}

const maxSize =
2 * 1024 * 1024;

if(
imageFile.size > maxSize
){


hideLoader();

alert(
  "Image must be below 2MB."
);

return;


}

}


    const redirectUrl =

    document.getElementById(
      "sponsorLink"
    ).value.trim();

    const startDateValue =

document.getElementById(
  "sponsorStartDate"
).value;

const startDate =

startDateValue
? new Date(startDateValue)
: null;


    const expiryValue =

    document.getElementById(
      "sponsorExpiry"
    ).value;

    const expiryDate =

    expiryValue
    ? new Date(expiryValue)
    : null;

    const priority =

Number(

  document.getElementById(
    "sponsorPriority"
  ).value

);

    const selectedDistricts =

    [];

    document
    .querySelectorAll(
      ".district-checkbox:checked"
    )
    .forEach(box => {

      selectedDistricts.push(
        box.value
      );

    });

    const isGlobal =

    document.getElementById(
      "sponsorGlobal"
    ).value === "true";

    if(title === ""){

      hideLoader();

      alert(
        "Please enter sponsor name."
      );

      return;

    }

    let imageUrl =

    window.currentSponsorImage || "";

    if(imageFile){

      const imageRef =

      ref(

        storage,

        "sponsors/" +

        Date.now() +

        "-" +

        imageFile.name

      );

      const compressedImage =

await compressImage(
  imageFile
);

await uploadBytes(

  imageRef,
  compressedImage

);

      imageUrl =

      await getDownloadURL(
        imageRef
      );

    }

    if(imageUrl === ""){

      hideLoader();

      alert(
        "Please select sponsor image."
      );

      return;

    }

    if(editingSponsorId){

      await updateDoc(

        doc(
          db,
          "sponsors",
          editingSponsorId
        ),

        {

          title:
          title,

          imageUrl:
          imageUrl,

          redirectUrl:
          redirectUrl,

          districts:
          selectedDistricts,

          isGlobal:
          isGlobal,

          expiryDate:
          expiryDate,

          priority:
          priority,

          startDate:
          startDate,

        }

      );

      alert(
        "Sponsor updated successfully."
      );

    }

    else{

      await addDoc(

        collection(
          db,
          "sponsors"
        ),

        {

          title:
          title,

          imageUrl:
          imageUrl,

          redirectUrl:
          redirectUrl,

          districts:
          selectedDistricts,

          isGlobal:
          isGlobal,

          expiryDate:
          expiryDate,

          priority:
          priority,

          startDate:
          startDate,

          isActive:true,

          clicks:0,

impressions:0,

          createdAt:
          serverTimestamp()

        }

      );

      alert(
        "Sponsor added successfully."
      );

    }

    editingSponsorId =
    null;

    window.currentSponsorImage =
    "";

    document.querySelector(
      ".save-btn"
    ).innerText =

    "Save Sponsor";

    document.getElementById(
      "sponsorTitle"
    ).value = "";

    document.getElementById(
      "sponsorImage"
    ).value = "";

    document.getElementById(
      "sponsorLink"
    ).value = "";

    document.getElementById(
      "sponsorExpiry"
    ).value = "";

    document.getElementById(
  "sponsorStartDate"
).value = "";

    document.getElementById(
      "sponsorGlobal"
    ).value =

    "false";

    document.getElementById(
  "sponsorPriority"
).value =

"1";

    hideLoader();

    loadSponsors();

  }

  catch(error){

    hideLoader();

    console.log(error);

    alert(
      error.message
    );

  }

}

/* =========================
LOAD SPONSORS
========================= */

async function loadSponsors(){

const sponsorList =

document.getElementById(
"sponsorList"
);

const expiredSponsorList =

document.getElementById(
"expiredSponsorList"

expiredSponsorList.innerHTML =

showLoader();

const snapshot =

await getDocs(

  collection(
    db,
    "sponsors"
  )

);

if(snapshot.empty){

  hideLoader();

  sponsorList.innerHTML =

  "No sponsors found.";

  expiredSponsorList.innerHTML =

  "No expired sponsors.";

  return;

}

snapshot.forEach(docSnap => {

  const data =
  docSnap.data();

  const now =
  new Date();

  const isExpired =

    data.expiryDate &&

    data.expiryDate.toDate() < now;

    /* =========================
AUTO DISABLE EXPIRED
========================= */

if(

isExpired &&

data.isActive === true

){

updateDoc(


doc(
  db,
  "sponsors",
  docSnap.id
),

{

  isActive:false

}


);

}


  let statusText =
  "ACTIVE";

  let statusColor =
  "#22c55e";

  if(!data.isActive){

    statusText =
    "DISABLED";

    statusColor =
    "#ef4444";

  }

  else if(isExpired){

    statusText =
    "EXPIRED";

    statusColor =
    "#f59e0b";

  }

  const sponsorCard = `


<div
class="sponsor-item
${data.isActive
? "active-sponsor"
: "inactive-sponsor"}"

ondblclick="
openSponsorDetails(
'${docSnap.id}'
)
"
>



<div class="sponsor-left">

<img
src="${
data.imageUrl || 'banner.png'
}"
class="sponsor-image">

<div>

<div
style="
display:flex;
align-items:center;
gap:10px;
flex-wrap:wrap;
">

<div class="sponsor-title">

${data.title}

</div>

<div

style="
padding:4px 10px;
border-radius:999px;
font-size:10px;
font-weight:700;
letter-spacing:.5px;
background:${statusColor}22;
color:${statusColor};
border:1px solid ${statusColor}55;
"

>

${statusText}

</div>

</div>

<div class="sponsor-meta">

${data.isGlobal
? "Global Sponsor"
: data.districts
? data.districts.join(", ")
: "No District"}

</div>

<div
style="
margin-top:6px;
font-size:11px;
color:#94a3b8;
line-height:1.7;
">

<div>

Start:
${data.startDate
? data.startDate
.toDate()
.toLocaleDateString()
: "Immediate"}

</div>

<div>

Expiry:
${data.expiryDate
? data.expiryDate
.toDate()
.toLocaleDateString()
: "No Expiry"}

</div>

<div>

Views:
${data.impressions || 0}

</div>

<div>

Clicks:
${data.clicks || 0}

</div>

</div>

</div>

</div>

<div class="action-wrap">

<button
class="action-btn"

style="
background:
rgba(59,130,246,.12);

color:#93c5fd;
"

onclick="
editSponsor(
'${docSnap.id}'
)
">

Edit

</button>

<button
class="action-btn
${data.isActive
? "disable-btn"
: "enable-btn"}"

onclick="
toggleSponsor(
'${docSnap.id}',
${data.isActive}
)
">

${data.isActive
? "Disable"
: "Enable"}

</button>

<button
class="action-btn delete-btn"

onclick="
deleteSponsor(
'${docSnap.id}'
)
">

Delete

</button>

</div>

</div>


  `;

  if(isExpired){

    expiredSponsorList.innerHTML +=
    sponsorCard;

  }

  else{

    sponsorList.innerHTML +=
    sponsorCard;

  }

});

if(
  expiredSponsorList.innerHTML === ""
){

  expiredSponsorList.innerHTML =

  "No expired sponsors.";

}

if(
  sponsorList.innerHTML === ""
){

  sponsorList.innerHTML =

  "No active sponsors.";

}

hideLoader();


}

catch(error){


hideLoader();

console.log(error);


}

}

async function editSponsor(id){

  try{

    const snapshot =

    await getDocs(

      collection(
        db,
        "sponsors"
      )

    );

    snapshot.forEach(docSnap => {

      if(docSnap.id === id){

        const data =
        docSnap.data();

        editingSponsorId =
        id;

        window.currentSponsorImage =
        data.imageUrl || "";

        document.getElementById(
          "sponsorTitle"
        ).value =

        data.title || "";

        document.getElementById(
          "sponsorLink"
        ).value =

        data.redirectUrl || "";

        document.getElementById(
  "sponsorStartDate"
).value =

data.startDate
? data.startDate
    .toDate()
    .toISOString()
    .split("T")[0]
: "";

        document.getElementById(
          "sponsorExpiry"
        ).value =

        data.expiryDate
        ? data.expiryDate
            .toDate()
            .toISOString()
            .split("T")[0]
        : "";
document.getElementById(
  "sponsorGlobal"
).value =

data.isGlobal
? "true"
: "false";

document.getElementById(
  "sponsorPriority"
).value =

data.priority || 1;

        document
        .querySelectorAll(
          ".district-checkbox"
        )
        .forEach(box => {

          box.checked =
          false;

        });

        if(data.districts){

          data.districts.forEach(district => {

            const checkbox =

            document.querySelector(

              `.district-checkbox[value="${district}"]`

            );

            if(checkbox){

              checkbox.checked =
              true;

            }

          });

        }

        toggleDistrictSelection();

        document.querySelector(
          ".save-btn"
        ).innerText =

        "Update Sponsor";

      }

    });

  }

  catch(error){

    console.log(error);

  }

}

window.editSponsor =
editSponsor;

function toggleDistrictSelection(){

  const isGlobal =

  sponsorGlobal.value ===
  "true";

  const checkboxes =

  document.querySelectorAll(
    ".district-checkbox"
  );

  checkboxes.forEach(box => {

    box.disabled =
    isGlobal;

    if(isGlobal){

      box.checked =
      false;

    }

  });

}

========================= */

async function toggleSponsor(

  id,
  currentStatus

){

  try{

    showLoader();

    await updateDoc(

      doc(
        db,
        "sponsors",
        id
      ),

      {

        isActive:
        !currentStatus

      }

    );

    hideLoader();

    loadSponsors();

  }

  catch(error){

    hideLoader();

    console.log(error);

  }

}

window.toggleSponsor =
toggleSponsor;

/* =========================
   DELETE
========================= */
async function deleteSponsor(id){

const confirmDelete =

confirm(
"Delete sponsor?"
);

if(!confirmDelete){


return;


}

try{


showLoader();

const snapshot =

await getDocs(

  collection(
    db,
    "sponsors"
  )

);

for(const docSnap of snapshot.docs){

  if(docSnap.id === id){

    const data =
    docSnap.data();

    /* =========================
       DELETE STORAGE IMAGE
    ========================= */

    if(data.imageUrl){

      try{

  const imageRef =

ref(
storage,
data.imageUrl
);


        await deleteObject(
          imageRef
        );

      }

      catch(storageError){

        console.log(
          storageError
        );

      }

    }

  }

}

/* =========================
   DELETE FIRESTORE DOC
========================= */

await deleteDoc(

  doc(
    db,
    "sponsors",
    id
  )

);

hideLoader();

loadSponsors();


}

catch(error){


hideLoader();

console.log(error);


}

}

window.deleteSponsor =
deleteSponsor;

  try{

    const container =

    document.getElementById(

    );

    "";

    const snapshot =

    await getDocs(

      collection(

        "districts"
      )

    );

    snapshot.forEach(docSnap => {

      const data =
      docSnap.data();

      container.innerHTML += `

style="

align-items:center;
gap:10px;

color:white;
">

type="checkbox"
class="district-checkbox"
value="${data.name}"

style="
width:18px;
height:18px;
accent-color:#c29b47;
">

${data.name}

</label>

      `;

    });

  }

  catch(error){

    console.log(error);

  }

}
