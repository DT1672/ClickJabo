<!DOCTYPE html>
<html>

<head>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<meta
name="theme-color"
content="#020817">

<title>
Master Sponsors
</title>

<link
rel="stylesheet"
href="admin.css">

<script
type="module"
src="master-auth-check.js">
</script>

<style>

body{

  margin:0;

  background:
  radial-gradient(
    circle at top,
    #071120,
    #020817 55%
  );

  color:white;

  font-family:Arial,sans-serif;

}

/* =========================
   LOADER
========================= */

.page-loader{

  position:fixed;

  top:0;
  left:0;

  width:100%;
  height:100%;

  background:
  rgba(2,8,23,.72);

  backdrop-filter:blur(6px);

  display:none;

  justify-content:center;
  align-items:center;

  z-index:99999;

}

.loader-spinner{

  width:62px;
  height:62px;

  border-radius:50%;

  border:
  4px solid rgba(255,255,255,.08);

  border-top:
  4px solid #c29b47;

  animation:
  spin .8s linear infinite;

}

@keyframes spin{

  from{

    transform:
    rotate(0deg);

  }

  to{

    transform:
    rotate(360deg);

  }

}

.page-container{

  max-width:1100px;

  margin:auto;

  padding:24px;

  box-sizing:border-box;

}

.page-header{

  display:flex;

  align-items:center;

  gap:14px;

  margin-bottom:24px;

}

.back-btn{

  width:42px;

  height:42px;

  border:none;

  border-radius:14px;

  background:
  rgba(255,255,255,.05);

  border:
  1px solid rgba(255,255,255,.06);

  color:white;

  font-size:18px;

  cursor:pointer;

}

.page-title{

  font-size:30px;

  font-weight:700;

}

.page-subtitle{

  margin-top:4px;

  font-size:12px;

  color:#94a3b8;

  letter-spacing:.8px;

}

.dashboard-card{

  background:
  linear-gradient(
    135deg,
    rgba(15,23,42,.94),
    rgba(15,23,42,.82)
  );

  border:
  1px solid rgba(255,255,255,.05);

  border-radius:24px;

  padding:22px;

  margin-bottom:20px;

  backdrop-filter:blur(16px);

}

.form-grid{

  display:grid;

  grid-template-columns:
  repeat(
    auto-fit,
    minmax(240px,1fr)
  );

  gap:14px;

}

input,
select{

  width:100%;

  height:48px;

  border:none;

  border-radius:16px;

  padding:0 14px;

  box-sizing:border-box;

  background:
  rgba(255,255,255,.05);

  border:
  1px solid rgba(255,255,255,.06);

  color:white;

  font-size:13px;

  outline:none;

}

option{

  background:#0f172a;

}

.save-btn{

  width:100%;

  height:48px;

  border:none;

  border-radius:16px;

  margin-top:18px;

  background:
  linear-gradient(
    135deg,
    #8b6b2e,
    #c29b47
  );

  color:white;

  font-size:14px;

  font-weight:700;

  cursor:pointer;

}

.sponsor-item{

  display:flex;

  justify-content:space-between;

  align-items:center;

  gap:16px;

  padding:16px;

  border-radius:18px;

  background:
  rgba(255,255,255,.03);

  border:
  1px solid rgba(255,255,255,.05);

  margin-bottom:12px;

  transition:.25s ease;

}

.sponsor-item.active-sponsor{

  border:
  1px solid rgba(34,197,94,.45);

  box-shadow:
  0 0 0 1px rgba(34,197,94,.08),
  0 0 18px rgba(34,197,94,.08);

}

.sponsor-item.inactive-sponsor{

  border:
  1px solid rgba(239,68,68,.38);

  box-shadow:
  0 0 0 1px rgba(239,68,68,.06),
  0 0 18px rgba(239,68,68,.06);

}

.sponsor-left{

  display:flex;

  gap:14px;

  align-items:center;

}

.sponsor-image{

  width:72px;

  height:72px;

  border-radius:16px;

  object-fit:cover;

  background:#0f172a;

}

.sponsor-title{

  font-size:15px;

  font-weight:700;

  margin-bottom:4px;

}

.sponsor-meta{

  font-size:12px;

  color:#94a3b8;

}

.action-wrap{

  display:flex;

  gap:10px;

}

.action-btn{

  height:38px;

  padding:0 14px;

  border:none;

  border-radius:12px;

  cursor:pointer;

  font-size:12px;

  font-weight:600;

}

.disable-btn{

  background:
  rgba(220,38,38,.12);

  color:#fca5a5;

}

.enable-btn{

  background:
  rgba(34,197,94,.12);

  color:#86efac;

}

.delete-btn{

  background:
  rgba(255,255,255,.06);

  color:white;

}

@media(max-width:768px){

  .sponsor-item{

    flex-direction:column;

    align-items:flex-start;

  }

}

</style>

</head>

<body>

<!-- LOADER -->

<div
class="page-loader"
id="globalLoader">

  <div
  class="loader-spinner">

  </div>

</div>

<div class="page-container">

<!-- HEADER -->

<div class="page-header">

  <button
  class="back-btn"
  onclick="
  window.location.href=
  'master-dashboard.html'
  ">

    ←

  </button>

  <div>

    <div class="page-title">

      Sponsor Management

    </div>

    <div class="page-subtitle">

      MASTER SPONSOR CONTROL

    </div>

  </div>

</div>

<!-- ADD SPONSOR -->

<div class="dashboard-card">

  <h3
  style="
  margin-top:0;
  margin-bottom:20px;
  ">

    Add Sponsor

  </h3>

  <div class="form-grid">

    <input
    type="text"
    id="sponsorTitle"
    placeholder="Sponsor Name">

 <input
type="file"
id="sponsorImage"
accept="image/png,image/jpeg,image/webp">



<div
style="
font-size:11px;
color:#94a3b8;
margin-top:-4px;
line-height:1.6;
grid-column:1/-1;
">

Recommended Banner Size:
1334 × 760 px PNG

Keep important logo/text centered
for best mobile visibility.

</div>


<input
type="text"
id="sponsorLink"
placeholder="Redirect URL">

<input
type="date"
id="sponsorExpiry">

<select id="sponsorPriority">

  <option value="1">

    Priority 1 (Highest)

  </option>

  <option value="2">

    Priority 2

  </option>

  <option value="3">

    Priority 3

  </option>

</select>



<div
id="districtCheckboxContainer"

style="
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(180px,1fr));
gap:10px;
padding:14px;
border-radius:16px;
background:
rgba(255,255,255,.03);
border:
1px solid rgba(255,255,255,.05);
max-height:220px;
overflow:auto;
">

Loading districts...

</div>

    <select id="sponsorGlobal">

      <option value="false">

        District Sponsor

      </option>

      <option value="true">

        Global Sponsor

      </option>

    </select>

  </div>

  <button
  class="save-btn"
  onclick="saveSponsor()">

    Save Sponsor

  </button>

</div>

<!-- SPONSOR LIST -->

<div class="dashboard-card">

  <h3
  style="
  margin-top:0;
  margin-bottom:20px;
  ">

    Active Sponsors

  </h3>

  <div id="sponsorList">

    Loading...

  </div>

</div>

</div>

<script type="module">

import {
  db
}
from "./firebase-config.js";

import {
  collection,
  addDoc,
  getDocs,
  doc,
  updateDoc,
  deleteDoc,
  serverTimestamp
}
from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

import {
  getStorage,
  ref,
  uploadBytes,
  getDownloadURL
}
from "https://www.gstatic.com/firebasejs/12.3.0/firebase-storage.js";

const storage =
getStorage();

let editingSponsorId =
null;

/* =========================
   LOADER
========================= */

function showLoader(){

  document.getElementById(
    "globalLoader"
  ).style.display =

  "flex";

}

function hideLoader(){

  document.getElementById(
    "globalLoader"
  ).style.display =

  "none";

}

/* =========================
   SAVE SPONSOR
========================= */

async function saveSponsor(){

  try{

    showLoader();

    const title =

    document.getElementById(
      "sponsorTitle"
    ).value.trim();

    const imageFile =

    document.getElementById(
      "sponsorImage"
    ).files[0];

    const redirectUrl =

    document.getElementById(
      "sponsorLink"
    ).value.trim();

    const expiryValue =

    document.getElementById(
      "sponsorExpiry"
    ).value;

    const expiryDate =

    expiryValue
    ? new Date(expiryValue)
    : null;

    const priority =

Number(

  document.getElementById(
    "sponsorPriority"
  ).value

);

    const selectedDistricts =

    [];

    document
    .querySelectorAll(
      ".district-checkbox:checked"
    )
    .forEach(box => {

      selectedDistricts.push(
        box.value
      );

    });

    const isGlobal =

    document.getElementById(
      "sponsorGlobal"
    ).value === "true";

    if(title === ""){

      hideLoader();

      alert(
        "Please enter sponsor name."
      );

      return;

    }

    let imageUrl =

    window.currentSponsorImage || "";

    if(imageFile){

      const imageRef =

      ref(

        storage,

        "sponsors/" +

        Date.now() +

        "-" +

        imageFile.name

      );

      await uploadBytes(

        imageRef,
        imageFile

      );

      imageUrl =

      await getDownloadURL(
        imageRef
      );

    }

    if(imageUrl === ""){

      hideLoader();

      alert(
        "Please select sponsor image."
      );

      return;

    }

    if(editingSponsorId){

      await updateDoc(

        doc(
          db,
          "sponsors",
          editingSponsorId
        ),

        {

          title:
          title,

          imageUrl:
          imageUrl,

          redirectUrl:
          redirectUrl,

          districts:
          selectedDistricts,

          isGlobal:
          isGlobal,

          expiryDate:
          expiryDate,

          priority:
          priority,

        }

      );

      alert(
        "Sponsor updated successfully."
      );

    }

    else{

      await addDoc(

        collection(
          db,
          "sponsors"
        ),

        {

          title:
          title,

          imageUrl:
          imageUrl,

          redirectUrl:
          redirectUrl,

          districts:
          selectedDistricts,

          isGlobal:
          isGlobal,

          expiryDate:
          expiryDate,

          priority:
          priority,

          isActive:true,

          createdAt:
          serverTimestamp()

        }

      );

      alert(
        "Sponsor added successfully."
      );

    }

    editingSponsorId =
    null;

    window.currentSponsorImage =
    "";

    document.querySelector(
      ".save-btn"
    ).innerText =

    "Save Sponsor";

    document.getElementById(
      "sponsorTitle"
    ).value = "";

    document.getElementById(
      "sponsorImage"
    ).value = "";

    document.getElementById(
      "sponsorLink"
    ).value = "";

    document.getElementById(
      "sponsorExpiry"
    ).value = "";

    document.getElementById(
      "sponsorGlobal"
    ).value =

    "false";

    document.getElementById(
  "sponsorPriority"
).value =

"1";

    hideLoader();

    loadSponsors();

  }

  catch(error){

    hideLoader();

    console.log(error);

    alert(
      error.message
    );

  }

}



window.saveSponsor =
saveSponsor;

/* =========================
   LOAD SPONSORS
========================= */

async function loadSponsors(){

  const sponsorList =

  document.getElementById(
    "sponsorList"
  );

  sponsorList.innerHTML =
  "";

  try{

    showLoader();

    const snapshot =

    await getDocs(

      collection(
        db,
        "sponsors"
      )

    );

    if(snapshot.empty){

      hideLoader();

      sponsorList.innerHTML =

      "No sponsors found.";

      return;

    }

    snapshot.forEach(docSnap => {

      const data =
      docSnap.data();

      sponsorList.innerHTML += `

<div
class="sponsor-item
${data.isActive
? "active-sponsor"
: "inactive-sponsor"}">

<div class="sponsor-left">

<img
src="${data.imageUrl}"
class="sponsor-image">

<div>

<div class="sponsor-title">

${data.title}

</div>

<div class="sponsor-meta">

${data.isGlobal
? "Global Sponsor"
: data.districts
? data.districts.join(", ")
: "No District"}

</div>

</div>

</div>

<div class="action-wrap">

<button
class="action-btn"

style="
background:
rgba(59,130,246,.12);

color:#93c5fd;
"

onclick="
editSponsor(
'${docSnap.id}'
)
">

Edit

</button>

<button
class="action-btn
${data.isActive
? "disable-btn"
: "enable-btn"}"

onclick="
toggleSponsor(
'${docSnap.id}',
${data.isActive}
)
">

${data.isActive
? "Disable"
: "Enable"}

</button>

<button
class="action-btn delete-btn"

onclick="
deleteSponsor(
'${docSnap.id}'
)
">

Delete

</button>

</div>

</div>

      `;

    });

    hideLoader();

  }

  catch(error){

    hideLoader();

    console.log(error);

  }

}

async function editSponsor(id){

  try{

    const snapshot =

    await getDocs(

      collection(
        db,
        "sponsors"
      )

    );

    snapshot.forEach(docSnap => {

      if(docSnap.id === id){

        const data =
        docSnap.data();

        editingSponsorId =
        id;

        window.currentSponsorImage =
        data.imageUrl || "";

        document.getElementById(
          "sponsorTitle"
        ).value =

        data.title || "";

        document.getElementById(
          "sponsorLink"
        ).value =

        data.redirectUrl || "";

        document.getElementById(
          "sponsorExpiry"
        ).value =

        data.expiryDate
        ? data.expiryDate
            .toDate()
            .toISOString()
            .split("T")[0]
        : "";

        document.getElementById(
          "sponsorGlobal"
        ).value =

        document.getElementById(
  "sponsorPriority"
).value =

data.priority || 1;

        data.isGlobal
        ? "true"
        : "false";

        document
        .querySelectorAll(
          ".district-checkbox"
        )
        .forEach(box => {

          box.checked =
          false;

        });

        if(data.districts){

          data.districts.forEach(district => {

            const checkbox =

            document.querySelector(

              `.district-checkbox[value="${district}"]`

            );

            if(checkbox){

              checkbox.checked =
              true;

            }

          });

        }

        toggleDistrictSelection();

        document.querySelector(
          ".save-btn"
        ).innerText =

        "Update Sponsor";

      }

    });

  }

  catch(error){

    console.log(error);

  }

}

window.editSponsor =
editSponsor;

function toggleDistrictSelection(){

  const isGlobal =

  sponsorGlobal.value ===
  "true";

  const checkboxes =

  document.querySelectorAll(
    ".district-checkbox"
  );

  checkboxes.forEach(box => {

    box.disabled =
    isGlobal;

    if(isGlobal){

      box.checked =
      false;

    }

  });

}

/* =========================
   TOGGLE
========================= */

async function toggleSponsor(

  id,
  currentStatus

){

  try{

    showLoader();

    await updateDoc(

      doc(
        db,
        "sponsors",
        id
      ),

      {

        isActive:
        !currentStatus

      }

    );

    hideLoader();

    loadSponsors();

  }

  catch(error){

    hideLoader();

    console.log(error);

  }

}

window.toggleSponsor =
toggleSponsor;

/* =========================
   DELETE
========================= */

async function deleteSponsor(id){

  const confirmDelete =

  confirm(
    "Delete sponsor?"
  );

  if(!confirmDelete){

    return;

  }

  try{

    showLoader();

    await deleteDoc(

      doc(
        db,
        "sponsors",
        id
      )

    );

    hideLoader();

    loadSponsors();

  }

  catch(error){

    hideLoader();

    console.log(error);

  }

}

window.deleteSponsor =
deleteSponsor;

/* =========================
   LOAD DISTRICTS
========================= */
async function loadDistrictOptions(){

  try{

    const container =

    document.getElementById(
      "districtCheckboxContainer"
    );

    container.innerHTML =
    "";

    const snapshot =

    await getDocs(

      collection(
        db,
        "districts"
      )

    );

    snapshot.forEach(docSnap => {

      const data =
      docSnap.data();

      container.innerHTML += `

<label
style="
display:flex;
align-items:center;
gap:10px;
font-size:13px;
color:white;
">

<input
type="checkbox"
class="district-checkbox"
value="${data.name}"

style="
width:18px;
height:18px;
accent-color:#c29b47;
">

${data.name}

</label>

      `;

    });

  }

  catch(error){

    console.log(error);

  }

}


/* =========================
   INITIAL LOAD
========================= */

loadDistrictOptions();

loadSponsors();

</script>

</body>

</html>
