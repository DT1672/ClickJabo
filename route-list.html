<script type="module">
function showLoader(){

  document.getElementById(
    "loadingOverlay"
  ).style.display =
  "flex";

}

function hideLoader(){

  document.getElementById(
    "loadingOverlay"
  ).style.display =
  "none";

}

import {
  db
}
from "./firebase-config.js";

import {
  collection,
  getDocs,
  deleteDoc,
  doc,
  addDoc
}
from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

/* =========================
   LOAD ROUTES
========================= */
async function loadRoutes(){

  showLoader();

  const querySnapshot =
  await getDocs(

    collection(
      db,
      "routes"
    )

  );

  const container =
  document.getElementById(
    "routeContainer"
  );

  container.innerHTML =
  "";

  if(querySnapshot.empty){

    container.innerHTML = `

<div
class="route-item"
style="
justify-content:center;
text-align:center;
padding:26px 18px;
border-radius:22px;
">

  <div class="route-info">

    <div
    style="
    font-size:32px;
    margin-bottom:10px;
    opacity:.7;
    ">

      🛣️

    </div>

    <strong
    style="
    font-size:14px;
    display:block;
    margin-bottom:6px;
    ">

      No Routes Found

    </strong>

    <p
    style="
    font-size:11px;
    color:#94a3b8;
    ">

      Tap the + button to add routes

    </p>

  </div>

</div>

    `;

    hideLoader();

    return;

  }

  querySnapshot.forEach(docSnap => {

    const route =
    docSnap.data();

    const docId =
    docSnap.id;

    container.innerHTML += `

  <div
class="route-item"
style="
padding:12px;
border-radius:18px;
margin-bottom:10px;
">
<div class="route-info">

  <strong
  style="
  display:block;
  font-size:13px;
  margin-bottom:6px;
  ">

    ${route.from}
    →
    ${route.to}

  </strong>

<p
style="
font-size:10px;
margin:3px 0;
color:#94a3b8;
display:flex;
gap:10px;
flex-wrap:wrap;
">

  <span>
    Hire
  </span>

  <span>
    Day ₹${route.hireDay}
  </span>

  <span>
    Night ₹${route.hireNight}
  </span>

</p>

<p
style="
font-size:10px;
margin:3px 0;
color:#94a3b8;
display:flex;
gap:10px;
flex-wrap:wrap;
">

  <span>
    Shared
  </span>

  <span>
    Day ₹${route.sharedDay}
  </span>

  <span>
    Night ₹${route.sharedNight}
  </span>

</p>

</div>

<div
class="route-actions"
style="
display:flex;
flex-direction:column;
gap:5px;
min-width:74px;
">

  <button
  class="edit-btn"
  style="
  padding:8px 12px;
  font-size:11px;
  border-radius:12px;
  "
  onclick="
  openEditRoute(
    '${docId}',
    '${route.district || "Dimapur"}',
    '${route.from}',
    '${route.to}',
    '${route.hireDay}',
    '${route.hireNight}',
    '${route.sharedDay}',
    '${route.sharedNight}'
  )
  ">
          Edit

        </button>

      <button
class="delete-btn"
style="
padding:7px 10px;
font-size:10px;
border-radius:11px;
min-height:34px;
"
onclick="
deleteRoute(
  '${docId}'
)
">

  Delete

</button>

      </div>

    </div>

    `;

  });

  hideLoader();

}

/* =========================
   EDIT
========================= */

function openEditRoute(
  docId,
  district,
  from,
  to,
  hireDay,
  hireNight,
  sharedDay,
  sharedNight
){

  localStorage.setItem(

    "editRoute",

    JSON.stringify({

      docId,
      district,
      from,
      to,
      hireDay,
      hireNight,
      sharedDay,
      sharedNight

    })

  );

  window.location.href =
  "fare-entry.html";

}

window.openEditRoute =
openEditRoute;

/* =========================
   DELETE
========================= */
async function deleteRoute(docId){

  showLoader();

  const confirmDelete =
  confirm(
    "Delete this route?"
  );

  if(!confirmDelete){

    hideLoader();

    return;

  }

  try{

    await deleteDoc(

      doc(
        db,
        "routes",
        docId
      )

    );

    loadRoutes();

  }

  catch(error){

    console.log(
      error
    );

    alert(
      "Unable to delete route."
    );

    hideLoader();

  }

}

/* =========================
   MODAL
========================= */

function openAddModal(){

  clearModal();

  document
    .getElementById(
      "routeModal"
    )
    .classList
    .add(
      "active"
    );

}

window.openAddModal =
openAddModal;

function closeModal(){

  document
    .getElementById(
      "routeModal"
    )
    .classList
    .remove(
      "active"
    );

}

window.closeModal =
closeModal;

/* =========================
   CLEAR MODAL
========================= */

function clearModal(){

  document.getElementById(
    "fromInput"
  ).value = "";

  document.getElementById(
    "toInput"
  ).value = "";

  document.getElementById(
    "hireDayInput"
  ).value = "";

  document.getElementById(
    "hireNightInput"
  ).value = "";

  document.getElementById(
    "sharedDayInput"
  ).value = "";

  document.getElementById(
    "sharedNightInput"
  ).value = "";

}

/* =========================
   SAVE ROUTE
========================= */
async function saveRoute(){

  showLoader();

  const from =
  document
    .getElementById(
      "fromInput"
    )
    .value
    .trim();

  const to =
  document
    .getElementById(
      "toInput"
    )
    .value
    .trim();

  const hireDay =
  document
    .getElementById(
      "hireDayInput"
    )
    .value;

  const hireNight =
  document
    .getElementById(
      "hireNightInput"
    )
    .value;

  const sharedDay =
  document
    .getElementById(
      "sharedDayInput"
    )
    .value;

  const sharedNight =
  document
    .getElementById(
      "sharedNightInput"
    )
    .value;

  if(

    from === "" ||
    to === "" ||
    hireDay === "" ||
    hireNight === "" ||
    sharedDay === "" ||
    sharedNight === ""

  ){

    hideLoader();

    alert(
      "Please fill all fields."
    );

    return;

  }

  if(from === to){

    hideLoader();

    alert(
      "Pickup and destination cannot be same."
    );

    return;

  }

  try{

    await addDoc(

      collection(
        db,
        "routes"
      ),

      {

        district:
        "Dimapur",

        from,
        to,
        hireDay,
        hireNight,
        sharedDay,
        sharedNight

      }

    );

    closeModal();

    loadRoutes();

  }

  catch(error){

    console.log(
      error
    );

    alert(
      "Unable to save route."
    );

    hideLoader();

  }

}


window.saveRoute =
saveRoute;

/* =========================
   INITIAL LOAD
========================= */

loadRoutes();

</script>
