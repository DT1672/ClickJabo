<!DOCTYPE html>
<html>

<head>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta
name="theme-color"
content="#020817">

<title>
Route List
</title>

<link
rel="stylesheet"
href="admin.css">

<link
rel="manifest"
href="admin-manifest.json">

<style>

.modal-card input{

  width:100%;
  padding:11px 12px;
  margin-bottom:10px;
  border:none;
  border-radius:14px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);
  color:white;
  font-size:12px;
  outline:none;
  box-sizing:border-box;

}

</style>

<script
type="module"
src="auth-check.js">
</script>

</head>

<body
style="
height:100dvh;
overflow-y:auto;
overflow-x:hidden;
">

<div
id="loadingOverlay"
class="loader-overlay">

<div
class="loader-spinner">

</div>

<div
class="loader-text">

Loading...

</div>

</div>

<div
class="top-bar"
style="
display:flex;
align-items:center;
justify-content:flex-start;
position:fixed;
top:0;
left:0;
width:100%;
height:64px;
padding:0 16px;
z-index:2000;
background:rgba(10,15,25,.75);
backdrop-filter:blur(18px);
box-sizing:border-box;
">

<button
class="back-btn"
onclick="window.location.href='admin-dashboard.html'"
style="
display:flex;
align-items:center;
justify-content:center;
width:38px;
height:38px;
border:none;
border-radius:14px;
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.08);
color:white;
font-size:18px;
backdrop-filter:blur(12px);
cursor:pointer;
">

←

</button>

</div>

<!-- MAIN -->

<div
class="dashboard-container"
style="
min-height:100dvh;
padding:88px 12px 100px 12px;
overflow:visible;
box-sizing:border-box;
">

<!-- HEADER -->

<div class="dashboard-header"
style="
text-align:center;
">

<h1
style="
font-size:22px;
margin-bottom:6px;
">

Route List

</h1>

<p
style="
font-size:9px;
letter-spacing:2px;
margin-top:4px;
">

SEARCH & MANAGE ROUTES

</p>

<div
class="district-badge"
style="
margin-top:16px;
padding:5px 12px;
font-size:9px;
">

N/A DISTRICT

</div>

</div>

<!-- SEARCH -->

<input
type="text"
id="routeSearch"
placeholder="Search route..."
style="
width:100%;
padding:11px 14px;
border:none;
border-radius:16px;
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.08);
color:white;
font-size:12px;
outline:none;
margin-top:18px;
">

<!-- ROUTE SECTION -->

<div
class="route-section"
style="
margin-top:14px;
overflow:hidden;
">

<div
id="routeContainer"
class="route-list"
style="
padding-top:2px;
padding-bottom:90px;
">

</div>

</div>

</div>

<script type="module">

function showLoader(){

document.getElementById(
"loadingOverlay"
).style.display =
"flex";

}

function hideLoader(){

document.getElementById(
"loadingOverlay"
).style.display =
"none";

}

import {
db
}
from "./firebase-config.js";

import {

getAdminSession

}
from "./shared-config.js";

import {

collection,
getDocs,
deleteDoc,
doc,
query,
where

}
from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

/* =========================
ADMIN SESSION
========================= */

const adminSession =

getAdminSession();

const adminDistrict =

adminSession.district;

const adminVehicleCategory =

adminSession.vehicleCategory;

const adminServiceProvider =

adminSession.serviceProvider;

/* =========================
UI SESSION INFO
========================= */

document.querySelector(
".district-badge"
).innerHTML =

`${adminDistrict || "N/A"} DISTRICT`;

/* =========================
LOAD ROUTES
========================= */

async function loadRoutes(){

showLoader();

try{

const routesQuery = query(

collection(
db,
"routes"
),

where(
"district",
"==",
adminDistrict
),

where(
"vehicleCategory",
"==",
adminVehicleCategory
),

where(
"serviceProvider",
"==",
adminServiceProvider
)

);

const querySnapshot =
await getDocs(
routesQuery
);

const container =
document.getElementById(
"routeContainer"
);

container.innerHTML =
"";

if(querySnapshot.empty){

container.innerHTML = `

<div
class="route-item"
style="
justify-content:center;
text-align:center;
padding:26px 18px;
border-radius:22px;
">

<div class="route-info">

<div
style="
font-size:32px;
margin-bottom:10px;
opacity:.7;
">

🛣️

</div>

<strong
style="
font-size:14px;
display:block;
margin-bottom:6px;
">

No Routes Found

</strong>

<p
style="
font-size:11px;
color:#94a3b8;
">

Add routes from Fare Entry

</p>

</div>

</div>

`;

hideLoader();

return;

}

querySnapshot.forEach(docSnap => {

const route =
docSnap.data();

const docId =
docSnap.id;

container.innerHTML += `

<div
class="route-item"
style="
padding:12px;
border-radius:18px;
margin-bottom:10px;
">

<div class="route-info">

<strong
style="
display:block;
font-size:13px;
margin-bottom:6px;
">

${route.from}
→
${route.to}

</strong>

<p
style="
font-size:10px;
margin:3px 0;
color:#94a3b8;
display:flex;
gap:10px;
flex-wrap:wrap;
">

<span>
Hire
</span>

<span>
Day ₹${route.hireDay}
</span>

<span>
Night ₹${route.hireNight}
</span>

</p>

<p
style="
font-size:10px;
margin:3px 0;
color:#94a3b8;
display:flex;
gap:10px;
flex-wrap:wrap;
">

<span>
Shared
</span>

<span>
Day ₹${route.sharedDay}
</span>

<span>
Night ₹${route.sharedNight}
</span>

</p>

</div>

<div
class="route-actions"
style="
display:flex;
flex-direction:column;
gap:5px;
min-width:74px;
">

<button
class="edit-btn"
style="
padding:8px 12px;
font-size:11px;
border-radius:12px;
"
onclick='openEditRoute(
${JSON.stringify(docId)},
${JSON.stringify(route.district)},
${JSON.stringify(route.from)},
${JSON.stringify(route.to)},
${JSON.stringify(route.hireDay)},
${JSON.stringify(route.hireNight)},
${JSON.stringify(route.sharedDay)},
${JSON.stringify(route.sharedNight)}
)'>

Edit

</button>

<button
class="delete-btn"
style="
padding:7px 10px;
font-size:10px;
border-radius:11px;
min-height:34px;
"
onclick="
deleteRoute(
'${docId}'
)
">

Delete

</button>

</div>

</div>

`;

});

}

catch(error){

console.log(error);

}

hideLoader();

}

/* =========================
EDIT
========================= */

function openEditRoute(
docId,
district,
from,
to,
hireDay,
hireNight,
sharedDay,
sharedNight
){

localStorage.setItem(

"editRoute",

JSON.stringify({

docId,
district,
from,
to,
hireDay,
hireNight,
sharedDay,
sharedNight

})

);

window.location.href =
"fare-entry.html";

}

window.openEditRoute =
openEditRoute;

/* =========================
DELETE
========================= */

async function deleteRoute(docId){

showLoader();

const confirmDelete =
confirm(
"Delete this route?"
);

if(!confirmDelete){

hideLoader();

return;

}

try{

await deleteDoc(

doc(
db,
"routes",
docId
)

);

loadRoutes();

}

catch(error){

console.log(error);

alert(
"Unable to delete route."
);

hideLoader();

}

}

window.deleteRoute =
deleteRoute;

/* =========================
SEARCH
========================= */

document.getElementById(
"routeSearch"
).addEventListener(

"input",

async function(){

const searchText =

this.value
.trim()
.toLowerCase();

const routeItems =

document.querySelectorAll(
".route-item"
);

routeItems.forEach(item => {

const text =

item.innerText
.toLowerCase();

item.style.display =

text.includes(searchText)

? "flex"

: "none";

});

}

);

/* =========================
INITIAL LOAD
========================= */

loadRoutes();

</script>

</body>

</html>
