<!DOCTYPE html>
<html>

<head>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
ClickJabo
</title>

<link
rel="stylesheet"
href="style.css">

<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css">

<link
rel="manifest"
href="manifest.json">

</head>

<body>

<div id="splash-screen">

<img
src="splash.png"
class="splash-image">

<div class="travel-dot"></div>

</div>

<div class="container">

<!-- HEADER -->

<div class="header">

<h1>
ClickJabo
</h1>

<p>
KNOW FARE BEFORE YOU GO
</p>

</div>

<!-- ROUTE CARD -->

<div class="glass-card route-card">

<div class="row">

<div class="half">

<label>
District
</label>

<select id="district">

</select>

</div>

<div class="half">

<label>
Ride Type
</label>

<select id="rideType">

<option value="hire">
Hire
</option>

<option value="shared">
Shared
</option>

</select>

</div>

</div>

<!-- VEHICLE CATEGORY -->

<label class="top-space">
Vehicle Type
</label>

<div
id="vehicleCategoryContainer"
class="vehicle-category-row">

</div>

<button
type="button"
onclick="openRouteModal()">

📍 Browse Routes

</button>

<!-- PICKUP -->

<label class="pickup-label">

Pickup Location

</label>

<select id="from">

<option value="">
</option>

</select>

<div class="swap-wrapper">

<button
type="button"
onclick="swapLocations()"
class="swap-mini-btn">

⇅

</button>

</div>


<!-- DESTINATION -->

<label class="destination-label">

Destination

</label>

<select id="to">

<option value="">
</option>

</select>

<!-- PROVIDERS -->

<div
id="providerSection">

<div class="provider-header">

<label>

Service Provider

</label>

<a
id="providerCallBtn"
href="tel:"
class="provider-call-btn"

onclick="

if(
  !selectedProviderID
){

  alert(
    'Please select a route first.'
  );

  return false;

}

">

📞 Call

</a>

</div>

<select
id="providerSelect">

<option value="">
Not Selected
</option>

</select>

</div>

<!-- PASSENGERS + FARE MODE -->

<div class="row top-space">

<div class="half">

<label>
Passengers
</label>

<input
type="number"
id="passengers"
value="1"
min="1">

</div>

<div class="half">

<label>
Fare Mode
</label>

<select id="fareMode">

<option value="day">
☀️ Day
</option>

<option value="night">
🌙 Night
</option>

</select>

</div>

</div>

<!-- CHECK FARE -->

<button onclick="checkFare()">

Check Fare

</button>

</div>
<!-- RESULT CARD -->
<div
class="glass-card result-glass"
style="display:none;">
<div
id="result"
style="display:none;">
</div>
</div>

<!-- INSTALL BANNER -->

<div class="glass-card install-card">

<div
id="sponsorCarousel"
style="
position:relative;
width:100%;
height:100%;
overflow:hidden;
border-radius:22px;
">

<div
id="sponsorDots"

style="
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:6px;
z-index:5;
">

</div>

</div>

</div>

<!-- FOOTER -->

<!-- BOTTOM ACTION BAR -->

<div
class="bottom-bar"
id="bottomBar">

<a
href="#"
target="_blank"
class="mini-about"
id="aboutBtn">

About ClickKounter

</a>

</div>

<!-- FOOTER -->

<div
class="footer-brand"
id="footerBrand">



</div>

</div>

<!-- FARE MODAL -->

<div
id="fareModal"

style="
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.65);
backdrop-filter:blur(6px);
z-index:99999;
justify-content:center;
align-items:center;
">

<div

style="
width:88%;
max-width:320px;
background:rgba(255,255,255,.06);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.08);
border-radius:24px;
padding:22px;
text-align:center;
">

<div

style="
font-size:13px;
color:#94a3b8;
letter-spacing:2px;
margin-bottom:10px;
">

RECOMMENDED FARE

</div>

<div
id="modalFare"

style="
font-size:48px;
font-weight:700;
color:#a3e635;
margin-bottom:10px;
">

₹0

</div>

<div

style="
font-size:12px;
color:#22c55e;
margin-bottom:12px;
">

✓ Fare Guide Rate

</div>

<div
id="modalUpdated"

style="
font-size:10px;
color:#64748b;
margin-bottom:18px;
">

Last Updated

</div>

<button

onclick="
closeFareModal()
"

style="
margin-top:0;
">

Close

</button>

</div>

</div>


<!-- ROUTE PICKER MODAL -->

<div
id="routeModal"

style="
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
backdrop-filter:blur(6px);
z-index:99999;
">

<div

style="
height:100%;
overflow-y:auto;
padding:20px;
">

<div
style="
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
">

<h2>

Browse Routes

</h2>

<button
onclick="closeRouteModal()">

✕ Close

</button>

</div>

<input
type="text"
id="routeSearch"

placeholder="Search Route"

style="
width:100%;
margin-bottom:15px;
">

<div
id="routeList">

</div>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>

<script
type="module"
src="app.js"
defer>

</script>

</body>

</html>
