<!DOCTYPE html>
<html>

<head>

  <meta
  name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>
    ClickJabo
  </title>

  <link
  rel="stylesheet"
  href="style.css">

  <link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css">

  <link
  rel="manifest"
  href="manifest.json">

</head>

<body>

<div id="splash-screen">

  <img
  src="splash.png"
  class="splash-image">

  <div class="travel-dot"></div>

</div>

<div class="container">

  <!-- HEADER -->

  <div class="header">

    <h1>
      ClickJabo
    </h1>

    <p>
      KNOW FARE BEFORE YOU GO
    </p>

  </div>

  <!-- ROUTE CARD -->

  <div class="glass-card route-card">

    <div class="row">

      <div class="half">

        <label>
          District
        </label>

        <select id="district">

        </select>

      </div>

      <div class="half">

        <label>
          Ride Type
        </label>

        <select id="rideType">

          <option value="hire">
            Hire
          </option>

          <option value="shared">
            Shared
          </option>

        </select>

      </div>

    </div>

    <!-- PICKUP -->

    <label class="top-space">
      🟩 Pickup Location
    </label>

    <select id="from">

      <option value="">
        📍 Select Pickup Location
      </option>

    </select>

    <!-- DESTINATION -->

    <label class="top-space">
      🟥 Destination
    </label>

    <select id="to">

      <option value="">
        📍 Select Destination
      </option>

    </select>

    <!-- SWAP -->

    <button
    class="swap-btn"
    onclick="swapLocations()">

      ⇅ Swap Route

    </button>

    <!-- PASSENGERS + FARE MODE -->

    <div class="row top-space">

      <div class="half">

        <label>
          Passengers
        </label>

        <input
        type="number"
        id="passengers"
        value="1"
        min="1">

      </div>

      <div class="half">

        <label>
          Fare Mode
        </label>

        <select id="fareMode">

          <option value="day">
            ☀️ Day
          </option>

          <option value="night">
            🌙 Night
          </option>

        </select>

      </div>

    </div>

    <!-- CHECK FARE -->

    <button onclick="checkFare()">

      Check Fare

    </button>

  </div>

  <!-- RESULT CARD -->

  <div class="glass-card result-glass">

    <p class="fare-label">

      ESTIMATED FARE

    </p>

    <h2 id="result">

      Select Route

    </h2>

    <p class="cheapest-tag">

      ✓ Recommended Fare

    </p>

    <p class="updated-date">

      Fare Last Updated:
      <span id="lastUpdated">

        --

      </span>

    </p>

  </div>

  <!-- INSTALL BANNER -->

  <div class="glass-card install-card">

    <img
    src="banner.png"
    alt="Install ClickJabo"
    class="install-banner">

  </div>

  <!-- BOTTOM ACTION BAR -->

  <div class="bottom-bar">

    <a
    href="https://yourwebsite.com"
    target="_blank"
    class="mini-about">

      About ClickKounter

    </a>

    <a
    id="helplineBtn"
    href="#"
    class="mini-complaint">

      Overcharged? Call Helpline

    </a>

  </div>

  <!-- FOOTER -->

  <div class="footer-brand">

    Recommended Fare Guide • Supported by Dimapur Taxi Association • A ClickKounter Product

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>

<script
type="module"
src="app.js"
defer>

</script>

</body>

</html>
