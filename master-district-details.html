<!DOCTYPE html>
<html>

<head>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<meta
name="theme-color"
content="#020817">

<title>
District Details
</title>

<script
type="module"
src="master-auth-check.js">
</script>

<style>

body{
margin:0;
background:#020817;
color:white;
font-family:sans-serif;
}

/* =========================
   LOADER
========================= */

.page-loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(2,8,23,.72);
backdrop-filter:blur(6px);
display:none;
justify-content:center;
align-items:center;
z-index:99999;
}

.loader-spinner{
width:62px;
height:62px;
border-radius:50%;
border:4px solid rgba(255,255,255,.08);
border-top:4px solid #c29b47;
animation:spin .8s linear infinite;
}

@keyframes spin{
from{
transform:rotate(0deg);
}
to{
transform:rotate(360deg);
}
}

/* =========================
   TOP BAR
========================= */

.top-bar{
display:flex;
align-items:center;
justify-content:space-between;
position:fixed;
top:0;
left:0;
width:100%;
height:70px;
padding:0 24px;
box-sizing:border-box;
z-index:2000;
background:rgba(10,15,25,.78);
backdrop-filter:blur(18px);
border-bottom:1px solid rgba(255,255,255,.05);
}

/* =========================
   MAIN
========================= */

.main-container{
width:100%;
max-width:1450px;
margin:auto;
padding:100px 24px 60px 24px;
box-sizing:border-box;
}

/* =========================
   DISTRICT HEADER
========================= */

.district-header{
display:flex;
justify-content:space-between;
align-items:center;
gap:20px;
flex-wrap:wrap;
padding:24px;
border-radius:28px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.06);
backdrop-filter:blur(16px);
margin-bottom:24px;
}

.district-name{
font-size:28px;
font-weight:700;
}

.district-meta{
font-size:13px;
color:#94a3b8;
margin-top:8px;
}

.header-stats{
display:flex;
gap:14px;
flex-wrap:wrap;
}

.stat-card{
padding:14px 18px;
border-radius:18px;
background:rgba(255,255,255,.03);
border:1px solid rgba(255,255,255,.04);
min-width:120px;
}

.stat-label{
font-size:11px;
color:#94a3b8;
margin-bottom:8px;
}

.stat-value{
font-size:22px;
font-weight:700;
}

/* =========================
   MONITOR CARD
========================= */

.monitor-card{
padding:24px;
border-radius:28px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.06);
backdrop-filter:blur(16px);
margin-bottom:24px;
}

.monitor-title{
font-size:20px;
font-weight:700;
}

.monitor-subtitle{
margin-top:6px;
font-size:12px;
color:#94a3b8;
}

.monitor-grid{
display:grid;
grid-template-columns:
repeat(
auto-fit,
minmax(260px,1fr)
);
gap:16px;
margin-top:24px;
}

.monitor-box{
display:flex;
justify-content:space-between;
align-items:center;
gap:18px;
padding:18px;
border-radius:20px;
background:rgba(255,255,255,.03);
border:1px solid rgba(255,255,255,.04);
}

.monitor-label{
font-size:14px;
font-weight:600;
}

.monitor-desc{
margin-top:6px;
font-size:11px;
color:#94a3b8;
}

/* =========================
   FILTER BAR
========================= */

.filter-grid{
display:grid;
grid-template-columns:
repeat(
auto-fit,
minmax(220px,1fr)
);
gap:14px;
margin-bottom:24px;
}

.filter-input{
height:48px;
border:none;
border-radius:16px;
padding:0 14px;
box-sizing:border-box;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.06);
color:white;
outline:none;
}

/* =========================
   ROUTE LIST
========================= */

.route-list{
display:flex;
flex-direction:column;
gap:14px;
}

.route-row{
padding:18px;
border-radius:24px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.06);
backdrop-filter:blur(16px);
}

.route-top{
display:flex;
justify-content:space-between;
align-items:center;
gap:20px;
flex-wrap:wrap;
margin-bottom:16px;
}

.route-title{
font-size:18px;
font-weight:700;
}

.route-code{
font-size:11px;
color:#94a3b8;
margin-top:6px;
}

.vehicle-grid{
display:grid;
grid-template-columns:
repeat(
auto-fit,
minmax(240px,1fr)
);
gap:14px;
}

.vehicle-card{
padding:16px;
border-radius:18px;
background:rgba(255,255,255,.03);
border:1px solid rgba(255,255,255,.04);
}

.vehicle-name{
font-size:15px;
font-weight:700;
margin-bottom:12px;
}

.fare-row{
display:flex;
justify-content:space-between;
font-size:13px;
margin-bottom:8px;
color:#cbd5e1;
}

.provider-count{
margin-top:12px;
font-size:11px;
color:#94a3b8;
}

/* =========================
   MOBILE
========================= */

@media(max-width:768px){

.top-bar{
padding:0 16px;
}

.main-container{
padding:90px 16px 40px 16px;
}

.district-header{
padding:20px;
}

.district-name{
font-size:22px;
}

}

</style>

</head>

<body>

<!-- LOADER -->

<div
class="page-loader"
id="globalLoader">

<div
class="loader-spinner">
</div>

</div>

<!-- TOP BAR -->

<div class="top-bar">

<div
style="
display:flex;
align-items:center;
gap:14px;
">

<button
onclick="window.history.back()"
style="
width:40px;
height:40px;
border:none;
border-radius:14px;
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.08);
color:white;
font-size:18px;
cursor:pointer;
">

←

</button>

<div>

<div
style="
font-size:18px;
font-weight:700;
">

District Details

</div>

<div
style="
font-size:11px;
color:#94a3b8;
margin-top:2px;
letter-spacing:1px;
">

CLICKJABO MASTER PANEL

</div>

</div>

</div>

</div>

<!-- MAIN -->

<div class="main-container">

<!-- HEADER -->

<div class="district-header">

<div>

<div
id="districtName"
class="district-name">

Loading...

</div>

<div
id="districtMeta"
class="district-meta">

Please wait...

</div>

</div>

<div class="header-stats">

<div class="stat-card">

<div class="stat-label">
Routes
</div>

<div
id="totalRoutes"
class="stat-value">
0
</div>

</div>

<div class="stat-card">

<div class="stat-label">
Providers
</div>

<div
id="totalProviders"
class="stat-value">
0
</div>

</div>

</div>

</div>

<!-- MONITOR -->

<div class="monitor-card">

<div class="monitor-title">
District Monitoring
</div>

<div class="monitor-subtitle">
Live operational overview
</div>

<div class="monitor-grid">

<div class="monitor-box">

<div>

<div class="monitor-label">
Monitoring Mode
</div>

<div class="monitor-desc">
Master read-only supervision
</div>

</div>

<div
style="
padding:8px 14px;
border-radius:999px;
font-size:11px;
font-weight:700;
background:
rgba(59,130,246,.12);
border:
1px solid rgba(59,130,246,.22);
color:#93c5fd;
">

LIVE

</div>

</div>

<div class="monitor-box">

<div>

<div class="monitor-label">
Pricing Control
</div>

<div class="monitor-desc">
Managed through Admin App
</div>

</div>

<div
style="
padding:8px 14px;
border-radius:999px;
font-size:11px;
font-weight:700;
background:
rgba(168,85,247,.12);
border:
1px solid rgba(168,85,247,.22);
color:#d8b4fe;
">

REMOTE

</div>

</div>

<div class="monitor-box">

<div>

<div class="monitor-label">
District Status
</div>

<div class="monitor-desc">
Current operational condition
</div>

</div>

<div
id="districtStatus"
style="
padding:8px 14px;
border-radius:999px;
font-size:11px;
font-weight:700;
background:
rgba(34,197,94,.12);
border:
1px solid rgba(34,197,94,.22);
color:#86efac;
">

ACTIVE

</div>

</div>

</div>

</div>

<!-- FILTER -->

<div class="filter-grid">

<input
type="text"
id="routeSearch"
class="filter-input"
placeholder="Search Route..."
oninput="applyFilters()">

<select
id="vehicleFilter"
class="filter-input"
onchange="applyFilters()">

<option value="">
All Vehicles
</option>

</select>

<select
id="providerFilter"
class="filter-input"
onchange="applyFilters()">

<option value="">
All Providers
</option>

</select>

</div>

<!-- ROUTE LIST -->

<div
id="routeList"
class="route-list">

</div>

</div>

<script type="module">

import {
db
}
from "./firebase-config.js";

import {
collection,
getDocs,
query,
where
}
from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

const params =
new URLSearchParams(
window.location.search
);

const districtID =
params.get("id");

function showLoader(){

document.getElementById(
"globalLoader"
).style.display =
"flex";

}

function hideLoader(){

document.getElementById(
"globalLoader"
).style.display =
"none";

}

function applyFilters(){

const searchValue =
document.getElementById(
"routeSearch"
).value.toLowerCase();

const vehicleValue =
document.getElementById(
"vehicleFilter"
).value;

const providerValue =
document.getElementById(
"providerFilter"
).value;

document
.querySelectorAll(".route-row")
.forEach(row => {

const routeText =
row.getAttribute(
"data-route"
);

const vehicles =
row.getAttribute(
"data-vehicles"
);

const providers =
row.getAttribute(
"data-providers"
);

const searchMatch =
routeText.includes(searchValue);

const vehicleMatch =
vehicleValue === "" ||
vehicles.includes(vehicleValue);

const providerMatch =
providerValue === "" ||
providers.includes(providerValue);

row.style.display =
searchMatch &&
vehicleMatch &&
providerMatch
? "block"
: "none";

});

}

window.applyFilters =
applyFilters;

/* =========================
   LOAD PAGE
========================= */

async function loadDistrictDetails(){

try{

showLoader();

const districtQuery =

query(

collection(db,"districts"),

where(
"districtID",
"==",
districtID
)

);

const districtSnapshot =

await getDocs(
districtQuery
);

if(districtSnapshot.empty){

alert(
"District not found."
);

hideLoader();

return;

}

const districtData =
districtSnapshot.docs[0].data();

document.getElementById(
"districtName"
).innerText =
districtData.name || "-";

document.getElementById(
"districtMeta"
).innerText =
districtData.districtID || "-";

document.getElementById(
"districtStatus"
).innerText =
districtData.isActive !== false
? "ACTIVE"
: "DISABLED";

const routesQuery =

query(

collection(db,"routes"),

where(
"districtID",
"==",
districtID
)

);

const routesSnapshot =
await getDocs(routesQuery);

const pricingQuery =

query(

collection(
db,
"routeVehiclePricing"
),

where(
"districtID",
"==",
districtID
)

);

const pricingSnapshot =
await getDocs(
pricingQuery
);

document.getElementById(
"totalRoutes"
).innerText =
routesSnapshot.size;

const providerSet =
new Set();

pricingSnapshot.forEach(docSnap => {

const data =
docSnap.data();

if(data.providerID){

providerSet.add(
data.providerID
);

}

});

document.getElementById(
"totalProviders"
).innerText =
providerSet.size;

const vehicleSet =
new Set();

const providerSetFilter =
new Set();

const routeList =
document.getElementById(
"routeList"
);

routeList.innerHTML = "";

for(const routeDoc of routesSnapshot.docs){

const route =
routeDoc.data();

const relatedPricing =

pricingSnapshot.docs.filter(p => {

return (
p.data().routeID ===
route.routeID
);

});

let vehicleHTML = "";

const routeVehicles = [];
const routeProviders = [];

relatedPricing.forEach(p => {

const price =
p.data();

routeVehicles.push(
price.vehicleID || ""
);

routeProviders.push(
price.providerID || ""
);

vehicleSet.add(
price.vehicleID || ""
);

providerSetFilter.add(
price.providerID || ""
);

vehicleHTML += `

<div class="vehicle-card">

<div class="vehicle-name">

${price.vehicleName || price.vehicleID || "-"}

</div>

<div class="fare-row">

<span>Share Day</span>

<span>
${price.shareDayFare != null
? `₹${price.shareDayFare}`
: "-"}

</span>

</div>

<div class="fare-row">

<span>Share Night</span>

<span>
${price.shareNightFare != null
? `₹${price.shareNightFare}`
: "-"}

</span>

</div>

<div class="fare-row">

<span>Hire Day</span>

<span>
${price.hireDayFare != null
? `₹${price.hireDayFare}`
: "-"}

</span>

</div>

<div class="fare-row">

<span>Hire Night</span>

<span>
${price.hireNightFare != null
? `₹${price.hireNightFare}`
: "-"}

</span>

</div>

<div class="provider-count">

Provider:
${price.providerName || price.providerID || "-"}

</div>

</div>

`;

});

routeList.innerHTML += `

<div
class="route-row"

data-route="
${route.fromPlace || ""}
${route.toPlace || ""}
"

data-vehicles="
${routeVehicles.join(",")}
"

data-providers="
${routeProviders.join(",")}
">

<div class="route-top">

<div>

<div class="route-title">

${route.fromPlace || "-"}
→
${route.toPlace || "-"}

</div>

<div class="route-code">

${route.routeCode || "-"}

</div>

</div>

<div
style="
padding:8px 12px;
border-radius:999px;
font-size:11px;
font-weight:600;
background:
${route.isActive !== false
? "rgba(34,197,94,.12)"
: "rgba(239,68,68,.12)"};

border:
1px solid
${route.isActive !== false
? "rgba(34,197,94,.22)"
: "rgba(239,68,68,.22)"};

color:
${route.isActive !== false
? "#86efac"
: "#fca5a5"};
">

${route.isActive !== false
? "ACTIVE"
: "DISABLED"}

</div>

</div>

<div class="vehicle-grid">

${vehicleHTML || ""}

</div>

</div>

`;

}

const vehicleFilter =
document.getElementById(
"vehicleFilter"
);

vehicleFilter.innerHTML =
`
<option value="">
All Vehicles
</option>
`;

vehicleSet.forEach(vehicle => {

vehicleFilter.innerHTML +=
`
<option value="${vehicle}">
${vehicle}
</option>
`;

});

const providerFilter =
document.getElementById(
"providerFilter"
);

providerFilter.innerHTML =
`
<option value="">
All Providers
</option>
`;

providerSetFilter.forEach(provider => {

providerFilter.innerHTML +=
`
<option value="${provider}">
${provider}
</option>
`;

});

hideLoader();

}

catch(error){

hideLoader();

console.log(error);

alert(
"Failed to load district details."
);

}

}

loadDistrictDetails();

</script>

</body>

</html>
