<!DOCTYPE html>
<html>

<head>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<meta
name="theme-color"
content="#020817">

<title>
Vehicle Categories
</title>

<link
rel="stylesheet"
href="admin.css">

<script
type="module"
src="master-auth-check.js">
</script>

<style>

body{
margin:0;
background:#020817;
color:white;
font-family:sans-serif;
}

/* =========================
   LOADER
========================= */

.page-loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(2,8,23,.72);
backdrop-filter:blur(6px);
display:none;
justify-content:center;
align-items:center;
z-index:99999;
}

.loader-spinner{
width:62px;
height:62px;
border-radius:50%;
border:4px solid rgba(255,255,255,.08);
border-top:4px solid #c29b47;
animation:spin .8s linear infinite;
}

@keyframes spin{

from{
transform:rotate(0deg);
}

to{
transform:rotate(360deg);
}

}

/* =========================
   PAGE
========================= */

.page-container{
max-width:900px;
margin:auto;
padding:24px;
}

.page-header{
display:flex;
align-items:center;
gap:14px;
margin-bottom:24px;
}

.back-btn{
width:42px;
height:42px;
border:none;
border-radius:14px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.06);
color:white;
font-size:18px;
cursor:pointer;
}

.page-title{
font-size:28px;
font-weight:700;
}

.page-subtitle{
margin-top:4px;
font-size:12px;
color:#94a3b8;
letter-spacing:.6px;
}

/* =========================
   CARD
========================= */

.glass-card{
background:#0f172a;
border:1px solid rgba(255,255,255,.06);
border-radius:24px;
padding:22px;
margin-bottom:20px;
}

/* =========================
   FORM
========================= */

label{
display:block;
margin-bottom:8px;
font-size:13px;
color:#cbd5e1;
}

.input-grid{
display:grid;
grid-template-columns:1fr 180px;
gap:14px;
}

input{
width:100%;
height:48px;
border:none;
border-radius:16px;
padding:0 14px;
box-sizing:border-box;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.06);
color:white;
font-size:14px;
outline:none;
}

.save-btn{
height:48px;
border:none;
border-radius:16px;
background:
linear-gradient(
135deg,
#8b6b2e,
#c29b47
);
color:white;
font-size:14px;
font-weight:700;
cursor:pointer;
}

/* =========================
   STATS
========================= */

.stats-row{
display:flex;
gap:14px;
flex-wrap:wrap;
margin-bottom:20px;
}

.stats-card{
flex:1;
min-width:180px;
padding:18px;
border-radius:20px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.06);
}

.stats-label{
font-size:12px;
color:#94a3b8;
}

.stats-value{
margin-top:10px;
font-size:30px;
font-weight:700;
}

/* =========================
   CATEGORY LIST
========================= */

.category-list{
display:flex;
flex-direction:column;
gap:12px;
}

.category-item{
display:flex;
justify-content:space-between;
align-items:center;
gap:20px;
padding:16px;
border-radius:18px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.05);
}

.category-left{
display:flex;
flex-direction:column;
gap:4px;
}

.category-name{
font-size:15px;
font-weight:700;
}

.category-meta{
font-size:11px;
color:#94a3b8;
}

.category-status{
padding:8px 12px;
border-radius:999px;
background:rgba(34,197,94,.12);
border:1px solid rgba(34,197,94,.22);
font-size:11px;
font-weight:700;
color:#86efac;
}

/* =========================
   EMPTY
========================= */

.empty-state{
padding:30px 10px;
text-align:center;
font-size:14px;
color:#94a3b8;
}

/* =========================
   MOBILE
========================= */

@media(max-width:768px){

.page-container{
padding:16px;
}

.page-title{
font-size:24px;
}

.input-grid{
grid-template-columns:1fr;
}

.category-item{
flex-direction:column;
align-items:flex-start;
}

}

</style>

</head>

<body>

<!-- LOADER -->

<div
class="page-loader"
id="globalLoader">

<div
class="loader-spinner">

</div>

</div>

<div class="page-container">

<!-- HEADER -->

<div class="page-header">

<button
class="back-btn"
onclick="
window.location.href=
'master-dashboard.html'
">

←

</button>

<div>

<div class="page-title">

Vehicle Categories

</div>

<div class="page-subtitle">

MASTER VEHICLE MANAGEMENT

</div>

</div>

</div>

<!-- STATS -->

<div class="stats-row">

<div class="stats-card">

<div class="stats-label">

Total Categories

</div>

<div
id="totalCategories"
class="stats-value">

0

</div>

</div>

</div>

<!-- ADD CATEGORY -->

<div class="glass-card">

<label>

Vehicle Category Name

</label>

<div class="input-grid">

<input
type="text"
id="categoryName"
placeholder="Example: Taxi">

<button
class="save-btn"
onclick="saveCategory()">

Save Category

</button>

</div>

</div>

<!-- CATEGORY LIST -->

<div class="glass-card">

<div
id="categoryList"
class="category-list">

</div>

</div>

</div>

<script type="module">

import {
db
}
from "./firebase-config.js";

import {
collection,
doc,
setDoc,
getDocs,
serverTimestamp
}
from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

/* =========================
   LOADER
========================= */

function showLoader(){

document.getElementById(
"globalLoader"
).style.display =
"flex";

}

function hideLoader(){

document.getElementById(
"globalLoader"
).style.display =
"none";

}

/* =========================
   SAVE CATEGORY
========================= */

async function saveCategory(){

const categoryName =

document.getElementById(
"categoryName"
).value.trim();

if(categoryName === ""){

alert(
"Enter category name."
);

return;

}

try{

showLoader();

const categoryID =

categoryName
.toLowerCase()
.replaceAll(" ","-");

await setDoc(

doc(
db,
"vehicles",
categoryID
),

{
categoryID:
categoryID,

name:
categoryName,

isActive:true,

createdAt:
serverTimestamp()
}

);

document.getElementById(
"categoryName"
).value = "";

await loadCategories();

hideLoader();

alert(
"Category saved."
);

}

catch(error){

hideLoader();

console.log(error);

alert(
"Failed to save category."
);

}

}

window.saveCategory =
saveCategory;

/* =========================
   LOAD CATEGORIES
========================= */

async function loadCategories(){

const categoryList =

document.getElementById(
"categoryList"
);

categoryList.innerHTML =
"";

try{

showLoader();

const snapshot =

await getDocs(

collection(
db,
"vehicles"
)

);

document.getElementById(
"totalCategories"
).innerText =
snapshot.size;

if(snapshot.empty){

categoryList.innerHTML =

`
<div class="empty-state">

No categories found.

</div>
`;

hideLoader();

return;

}

snapshot.forEach(docSnap => {

const data =
docSnap.data();

categoryList.innerHTML += `

<div class="category-item">

<div class="category-left">

<div class="category-name">

${data.name || "-"}

</div>

<div class="category-meta">

${data.categoryID || docSnap.id}

</div>

</div>

<div class="category-status">

ACTIVE

</div>

</div>

`;

});

hideLoader();

}

catch(error){

hideLoader();

console.log(error);

alert(
"Failed to load categories."
);

}

}

loadCategories();

</script>

</body>

</html>
