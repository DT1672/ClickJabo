<!DOCTYPE html>
<html>

<head>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta
name="theme-color"
content="#020817">

<title>
ClickJabo Admin
</title>

<link
rel="stylesheet"
href="admin.css">

<link
rel="manifest"
href="admin-manifest.json">

</head>

<body>
  
<div
id="loadingOverlay"
class="loader-overlay">

  <div
  class="loader-spinner">

  </div>

  <div
  class="loader-text">

    Loading...

  </div>

</div>

<!-- LOGIN CONTAINER -->

<div class="login-container">

  <!-- LOGIN CARD -->

  <div class="login-card">

    <!-- LOGO -->


<div class="login-logo">

  <img
  src="admin-icon.png"
  alt="ClickJabo Logo">

</div>



    <!-- TITLE -->

    <h1>
      ClickJabo
    </h1>

    <p class="sub-text">

      DISTRICT ADMIN ACCESS

    </p>

    <!-- FORM -->

    <div class="login-form">

      
<label>
  User ID
</label>

<input
type="text"
id="adminEmail"
placeholder="Enter user ID"
autocomplete="off">

      <label>
        Password
      </label>

      <input
      type="password"
      id="adminPassword"
      placeholder="Enter password"
      autocomplete="off">

      <button
      id="loginBtn"
      onclick="loginAdmin()">

        Login

      </button>

    </div>

    <!-- FOOTER -->

    <div class="login-footer">

      Secure District Control Panel

    </div>

  </div>

</div>

<script type="module">

function showLoader(){

  document.getElementById(
    "loadingOverlay"
  ).style.display =
  "flex";

}

function hideLoader(){

  document.getElementById(
    "loadingOverlay"
  ).style.display =
  "none";

}

import {
  auth,
  db
}
from "./firebase-config.js";

import {

  saveAdminSession

}
from "./shared-config.js";

import {
  signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/12.3.0/firebase-auth.js";

import {

  doc,
  getDoc

}
from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

/* =========================
   LOGIN
========================= */

async function loginAdmin(){

  showLoader();

  const email =
  document.getElementById(
    "adminEmail"
  ).value.trim();

  const password =
  document.getElementById(
    "adminPassword"
  ).value.trim();

  const loginBtn =
  document.getElementById(
    "loginBtn"
  );

  if(
    email === "" ||
    password === ""
  ){

    hideLoader();

    alert(
      "Please enter email and password."
    );

    return;

  }

  loginBtn.innerText =
  "Please wait...";

  loginBtn.disabled =
  true;

  try{

    /* FIREBASE LOGIN */

    const userCredential =

    await signInWithEmailAndPassword(

      auth,
      email,
      password

    );

    const user =
    userCredential.user;

    /* LOAD ADMIN PROFILE */

    const adminDoc =
    await getDoc(

      doc(
        db,
        "districtAdmins",
        user.uid
      )

    );

    if(!adminDoc.exists()){

      hideLoader();

      alert(
        "Admin profile not found."
      );

      return;

    }

    const adminData =
    adminDoc.data();

    /* SAVE SESSION */

    saveAdminSession(

      adminData.district,

      adminData.vehicleCategory,

      adminData.serviceProvider

    );

    /* REDIRECT */

    window.location.href =
    "admin-dashboard.html";

  }
catch(error){

  hideLoader();

  console.log(
    error.code
  );

  console.log(
    error.message
  );

  alert(
    error.code
  );

  loginBtn.innerText =
  "Login";

  loginBtn.disabled =
  false;

}

}

window.loginAdmin =
loginAdmin;

</script>
 

</body>

</html>
