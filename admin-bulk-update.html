<!DOCTYPE html>
<html>

<head>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta
name="theme-color"
content="#020817">

<title>
Bulk Update
</title>

<link
rel="stylesheet"
href="admin.css">

<link
rel="manifest"
href="admin-manifest.json">

<style>

.form-input{

  width:100%;
  padding:11px 12px;
  border:none;
  border-radius:16px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);
  color:white;
  font-size:12px;
  outline:none;
  box-sizing:border-box;

}

.form-input option{

  background:#0f172a;
  color:white;

}

.route-checkbox-item{

  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  border-radius:14px;
  margin-bottom:8px;
  background:rgba(255,255,255,.04);
  font-size:12px;

}

</style>

<script
type="module"
src="auth-check.js">
</script>

</head>

<body

style="
min-height:100dvh;
overflow-y:auto;
overflow-x:hidden;
">

<!-- LOADER -->

<div
id="loadingOverlay"
class="loader-overlay">

  <div class="loader-spinner"></div>

  <div class="loader-text">

    Loading...

  </div>

</div>

<!-- TOP BAR -->

<div
class="top-bar"
style="
display:flex;
align-items:center;
justify-content:flex-start;
position:fixed;
top:0;
left:0;
width:100%;
height:64px;
padding:0 16px;
z-index:2000;
background:rgba(10,15,25,.75);
backdrop-filter:blur(18px);
box-sizing:border-box;
">

  <button
  class="back-btn"
  onclick="window.location.href='admin-dashboard.html'"
  style="
  display:flex;
  align-items:center;
  justify-content:center;
  width:38px;
  height:38px;
  border:none;
  border-radius:14px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);
  color:white;
  font-size:18px;
  backdrop-filter:blur(12px);
  cursor:pointer;
  ">

    ←

  </button>

</div>

<!-- MAIN -->

<div
class="dashboard-container"
style="
min-height:100dvh;
padding:88px 12px 140px 12px;
overflow-y:auto;
overflow-x:hidden;
box-sizing:border-box;
">

<h1
style="
text-align:center;
font-size:24px;
">

Bulk Update

</h1>

<p
style="
text-align:center;
font-size:11px;
color:#94a3b8;
margin-bottom:24px;
">

DISTRICT FARE CONTROL

</p>

<!-- UPDATE MODE -->

<p
style="
font-size:12px;
margin-bottom:6px;
">

Update Mode

</p>

<select
id="updateMode"
class="form-input">

<option value="temporary">

  Temporary Adjustment

</option>

<option value="permanent">

  Permanent Adjustment

</option>

</select>

<!-- ACTION -->

<p
style="
font-size:12px;
margin-top:16px;
margin-bottom:6px;
">

Action

</p>

<select
id="actionType"
class="form-input">

<option value="increase">

  Increase Fare

</option>

<option value="decrease">

  Decrease Fare

</option>

</select>

<!-- AMOUNT -->

<p
style="
font-size:12px;
margin-top:16px;
margin-bottom:6px;
">

Amount

</p>

<input
type="number"
id="adjustmentAmount"
placeholder="Enter amount"
class="form-input">

<!-- APPLY TO -->

<div
style="
margin-top:18px;
">

<p
style="
font-size:12px;
margin-bottom:10px;
">

Apply To

</p>

<label>

<input
type="checkbox"
id="applyHireDay">

Hire Day

</label>

<br><br>

<label>

<input
type="checkbox"
id="applyHireNight">

Hire Night

</label>

<br><br>

<label>

<input
type="checkbox"
id="applySharedDay">

Shared Day

</label>

<br><br>

<label>

<input
type="checkbox"
id="applySharedNight">

Shared Night

</label>

</div>

<!-- SEARCH -->

<input
type="text"
id="routeSearch"
placeholder="Search route..."
class="form-input"
style="
margin-top:24px;
margin-bottom:14px;
">

<!-- SELECT ALL -->

<div
style="
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:16px;
font-size:12px;
">

<label
style="
display:flex;
align-items:center;
gap:10px;
">

<input
type="checkbox"
id="selectAllRoutes">

Select All Routes

</label>

<div
id="selectedCount"
style="
color:#94a3b8;
font-size:11px;
">

0 Selected

</div>

</div>

<!-- ROUTE LIST -->

<div
id="bulkRouteList"
style="
margin-top:10px;
max-height:260px;
overflow-y:auto;
padding:4px;
border-radius:18px;
background:rgba(255,255,255,.03);
border:1px solid rgba(255,255,255,.06);
">

</div>

<!-- TEMPORARY ACTIVE LIST -->

<div
style="
margin-top:24px;
">

<div
style="
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:12px;
">

<p
style="
font-size:12px;
font-weight:600;
">

Active Temporary Adjustments

</p>

<div
id="tempAdjustmentCount"
style="
font-size:11px;
color:#94a3b8;
">

0 Active

</div>

</div>

<div
id="temporaryList"
style="
background:rgba(255,255,255,.03);
border:1px solid rgba(255,255,255,.06);
border-radius:18px;
padding:10px;
max-height:220px;
overflow-y:auto;
">

<div
style="
font-size:11px;
color:#94a3b8;
text-align:center;
padding:10px;
">

No temporary adjustments

</div>

</div>

</div>

<!-- BUTTONS -->

<button
onclick="applyBulkUpdate()"
style="
margin-top:24px;
width:100%;
height:42px;
border:none;
border-radius:14px;
background:linear-gradient(
135deg,
#8b6b2e,
#c29b47
);
color:white;
font-size:12px;
font-weight:600;
letter-spacing:.3px;
box-shadow:
0 4px 14px rgba(194,155,71,.16);
cursor:pointer;
">

Apply Bulk Update

</button>

<button
onclick="removeTemporaryAdjustments()"
style="
margin-top:12px;
width:100%;
height:42px;
border:none;
border-radius:14px;
background:linear-gradient(
135deg,
#7f1d1d,
#b91c1c
);
color:white;
font-size:12px;
font-weight:600;
letter-spacing:.3px;
box-shadow:
0 4px 14px rgba(185,28,28,.16);
cursor:pointer;
">

Remove Temporary Adjustments

</button>

</div>

<script type="module">

import {
  db
}
from "./firebase-config.js";

import {
  collection,
  getDocs,
  updateDoc,
  doc,
  addDoc,
  serverTimestamp
}
from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

async function addActivityLog(text){

  await addDoc(

    collection(
      db,
      "activityLogs"
    ),

    {

      action:text,

      createdAt:
      serverTimestamp()

    }

  );

}

/* =========================
   SHOW LOADER
========================= */

function showLoader(){

  document.getElementById(
    "loadingOverlay"
  ).style.display =
  "flex";

}

function hideLoader(){

  document.getElementById(
    "loadingOverlay"
  ).style.display =
  "none";

}

/* =========================
   UPDATE SELECT COUNT
========================= */

function updateSelectedCount(){

  const selected =
  document.querySelectorAll(
    ".routeCheckbox:checked"
  ).length;

  document.getElementById(
    "selectedCount"
  ).innerText =

  selected + " Selected";

}

window.updateSelectedCount =
updateSelectedCount;

/* =========================
   LOAD ROUTES
========================= */

async function loadBulkRoutes(){

  showLoader();

  try{

    const querySnapshot =
    await getDocs(

      collection(
        db,
        "routes"
      )

    );

    const container =
    document.getElementById(
      "bulkRouteList"
    );

    container.innerHTML =
    "";

    const temporaryList =
    document.getElementById(
      "temporaryList"
    );

    temporaryList.innerHTML =
    "";

    let tempCount = 0;

    querySnapshot.forEach(docSnap => {

      const route =
      docSnap.data();

      container.innerHTML += `

<label
class="route-checkbox-item">

<input
type="checkbox"
class="routeCheckbox"
value="${docSnap.id}"
onchange="updateSelectedCount()">

${route.from}
→
${route.to}

</label>

      `;

      const tempItems = [];

      if(Number(route.tempHireDay || 0) !== 0){

        tempItems.push(
          "Hire Day: ₹" +
          route.tempHireDay
        );

      }

      if(Number(route.tempHireNight || 0) !== 0){

        tempItems.push(
          "Hire Night: ₹" +
          route.tempHireNight
        );

      }

      if(Number(route.tempSharedDay || 0) !== 0){

        tempItems.push(
          "Shared Day: ₹" +
          route.tempSharedDay
        );

      }

      if(Number(route.tempSharedNight || 0) !== 0){

        tempItems.push(
          "Shared Night: ₹" +
          route.tempSharedNight
        );

      }

      if(tempItems.length > 0){

        tempCount++;

        temporaryList.innerHTML += `

<div
style="
padding:10px;
border-radius:14px;
margin-bottom:8px;
background:rgba(255,255,255,.04);
">

<div
style="
font-size:12px;
font-weight:600;
margin-bottom:6px;
">

${route.from}
→
${route.to}

</div>

<div
style="
font-size:11px;
color:#cbd5e1;
line-height:1.7;
">

${tempItems.join("<br>")}

</div>

</div>

        `;

      }

    });

    document.getElementById(
      "tempAdjustmentCount"
    ).innerText =

    tempCount + " Active";

    if(tempCount === 0){

      temporaryList.innerHTML = `

<div
style="
font-size:11px;
color:#94a3b8;
text-align:center;
padding:10px;
">

No temporary adjustments

</div>

      `;

    }

  }

  catch(error){

    console.log(error);

    alert(
      "Unable to load routes."
    );

  }

  hideLoader();

}

/* =========================
   SELECT ALL
========================= */

document.getElementById(
  "selectAllRoutes"
).addEventListener(

  "change",

  function(){

    const checked =
    this.checked;

    document
    .querySelectorAll(
      ".routeCheckbox"
    )
    .forEach(box => {

      box.checked =
      checked;

    });

    updateSelectedCount();

  }

);

/* =========================
   SEARCH
========================= */

document.getElementById(
  "routeSearch"
).addEventListener(

  "input",

  function(){

    const search =
    this.value.toLowerCase();

    const labels =
    document.querySelectorAll(
      "#bulkRouteList label"
    );

    labels.forEach(label => {

      if(

        label.innerText
        .toLowerCase()
        .includes(search)

      ){

        label.style.display =
        "flex";

      }

      else{

        label.style.display =
        "none";

      }

    });

  }

);

/* =========================
   APPLY BULK UPDATE
========================= */

async function applyBulkUpdate(){

  showLoader();

  const updateMode =
  document.getElementById(
    "updateMode"
  ).value;

  const actionType =
  document.getElementById(
    "actionType"
  ).value;

  const amount =
  Number(

    document.getElementById(
      "adjustmentAmount"
    ).value

  );

  const applyHireDay =
  document.getElementById(
    "applyHireDay"
  ).checked;

  const applyHireNight =
  document.getElementById(
    "applyHireNight"
  ).checked;

  const applySharedDay =
  document.getElementById(
    "applySharedDay"
  ).checked;

  const applySharedNight =
  document.getElementById(
    "applySharedNight"
  ).checked;

  if(!amount || amount <= 0){

    hideLoader();

    alert(
      "Please enter valid amount."
    );

    return;

  }

  let adjustment =
  amount;

  if(actionType === "decrease"){

    adjustment =
    adjustment * -1;

  }

  try{

    const querySnapshot =
    await getDocs(

      collection(
        db,
        "routes"
      )

    );

    const selectedRoutes =

    document.querySelectorAll(
      ".routeCheckbox:checked"
    );

    if(selectedRoutes.length === 0){

      hideLoader();

      alert(
        "Please select routes."
      );

      return;

    }

    for(const selected of selectedRoutes){

      const docId =
      selected.value;

      const docSnap =
      querySnapshot.docs.find(
        d => d.id === docId
      );

      if(!docSnap){

        continue;

      }

      const route =
      docSnap.data();

      const docRef =
      doc(
        db,
        "routes",
        docId
      );

     let updateData = {

  updatedAt:
  serverTimestamp()

};

      if(updateMode === "temporary"){

        if(applyHireDay){

          updateData.tempHireDay =
          Math.max(
            0,
            Number(route.tempHireDay || 0)
            + adjustment
          );

        }

        if(applyHireNight){

          updateData.tempHireNight =
          Math.max(
            0,
            Number(route.tempHireNight || 0)
            + adjustment
          );

        }

        if(applySharedDay){

          updateData.tempSharedDay =
          Math.max(
            0,
            Number(route.tempSharedDay || 0)
            + adjustment
          );

        }

        if(applySharedNight){

          updateData.tempSharedNight =
          Math.max(
            0,
            Number(route.tempSharedNight || 0)
            + adjustment
          );

        }

      }

      else{

        if(applyHireDay){

          updateData.hireDay =
          Math.max(
            0,
            Number(route.hireDay || 0)
            + adjustment
          );

        }

        if(applyHireNight){

          updateData.hireNight =
          Math.max(
            0,
            Number(route.hireNight || 0)
            + adjustment
          );

        }

        if(applySharedDay){

          updateData.sharedDay =
          Math.max(
            0,
            Number(route.sharedDay || 0)
            + adjustment
          );

        }

        if(applySharedNight){

          updateData.sharedNight =
          Math.max(
            0,
            Number(route.sharedNight || 0)
            + adjustment
          );

        }

      }

      await updateDoc(
        docRef,
        updateData
      );

    }

    hideLoader();

    addActivityLog(

  selectedRoutes.length +
  " routes updated"

);

    alert(
      "Bulk update applied successfully."
    );

    loadBulkRoutes();

  }

  catch(error){

    console.log(error);

    hideLoader();

    alert(
      "Unable to apply bulk update."
    );

  }

}

window.applyBulkUpdate =
applyBulkUpdate;

/* =========================
   REMOVE TEMPORARY
========================= */

async function removeTemporaryAdjustments(){

  const selectedRoutes =

  document.querySelectorAll(
    ".routeCheckbox:checked"
  );

  if(selectedRoutes.length === 0){

    alert(
      "Please select routes."
    );

    return;

  }

  const confirmReset =
  confirm(
    "Remove temporary adjustments from selected routes?"
  );

  if(!confirmReset){

    return;

  }

  showLoader();

  try{

    for(const selected of selectedRoutes){

      const docId =
      selected.value;

      const docRef =
      doc(
        db,
        "routes",
        docId
      );

      await updateDoc(

        docRef,

        
{

  tempHireDay:0,
  tempHireNight:0,
  tempSharedDay:0,
  tempSharedNight:0,

  updatedAt:
  serverTimestamp()

}

      );

    }

    hideLoader();

    addActivityLog(

  selectedRoutes.length +
  " temporary adjustments removed"

);

    alert(
      "Selected temporary adjustments removed."
    );

    loadBulkRoutes();

  }

  catch(error){

    console.log(error);

    hideLoader();

    alert(
      "Unable to remove temporary adjustments."
    );

  }

}

window.removeTemporaryAdjustments =
removeTemporaryAdjustments;

/* =========================
   INITIAL LOAD
========================= */

loadBulkRoutes();

</script>

</body>

</html>
