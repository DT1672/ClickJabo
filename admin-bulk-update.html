<!DOCTYPE html>
<html>

<head>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta
name="theme-color"
content="#020817">

<title>
Bulk Update
</title>

<link
rel="stylesheet"
href="admin.css">

<link
rel="manifest"
href="admin-manifest.json">

<style>

.form-input{

  width:100%;
  padding:11px 12px;
  border:none;
  border-radius:16px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);
  color:white;
  font-size:12px;
  outline:none;
  box-sizing:border-box;

}

.form-input option{

  background:#0f172a;
  color:white;

}

.route-checkbox-item{

  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  border-radius:14px;
  margin-bottom:8px;
  background:rgba(255,255,255,.04);
  font-size:12px;

}

</style>

<script
type="module"
src="auth-check.js">
</script>

</head>

<body

style="
min-height:100dvh;
overflow-y:auto;
overflow-x:hidden;
">

<div
id="loadingOverlay"
class="loader-overlay">

  <div class="loader-spinner"></div>

  <div class="loader-text">

    Loading...

  </div>

</div>

<div
class="dashboard-container"
style="
min-height:100dvh;
padding:30px 12px 140px 12px;
overflow-y:auto;
overflow-x:hidden;
box-sizing:border-box;
">

<h1
style="
text-align:center;
font-size:24px;
">

Bulk Update

</h1>

<p
style="
text-align:center;
font-size:11px;
color:#94a3b8;
margin-bottom:24px;
">

DISTRICT FARE CONTROL

</p>

<!-- UPDATE MODE -->

<p
style="
font-size:12px;
margin-bottom:6px;
">

Update Mode

</p>

<select
id="updateMode"
class="form-input">

<option value="temporary">

  Temporary Adjustment

</option>

<option value="permanent">

  Permanent Adjustment

</option>

</select>

<!-- ACTION -->

<p
style="
font-size:12px;
margin-top:16px;
margin-bottom:6px;
">

Action

</p>

<select
id="actionType"
class="form-input">

<option value="increase">

  Increase Fare

</option>

<option value="decrease">

  Decrease Fare

</option>

</select>

<!-- AMOUNT -->

<p
style="
font-size:12px;
margin-top:16px;
margin-bottom:6px;
">

Amount

</p>

<input
type="number"
id="adjustmentAmount"
placeholder="Enter amount"
class="form-input">

<!-- APPLY TO -->

<div
style="
margin-top:18px;
">

<p
style="
font-size:12px;
margin-bottom:10px;
">

Apply To

</p>

<label>

<input
type="checkbox"
id="applyHireDay">

Hire Day

</label>

<br><br>

<label>

<input
type="checkbox"
id="applyHireNight">

Hire Night

</label>

<br><br>

<label>

<input
type="checkbox"
id="applySharedDay">

Shared Day

</label>

<br><br>

<label>

<input
type="checkbox"
id="applySharedNight">

Shared Night

</label>

</div>

<!-- SEARCH -->

<input
type="text"
id="routeSearch"
placeholder="Search route..."
class="form-input"
style="
margin-top:24px;
margin-bottom:14px;
">

<!-- SELECT ALL -->

<div
style="
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:16px;
font-size:12px;
">

<label
style="
display:flex;
align-items:center;
gap:10px;
">

<input
type="checkbox"
id="selectAllRoutes">

Select All Routes

</label>

<div
id="selectedCount"
style="
color:#94a3b8;
font-size:11px;
">

0 Selected

</div>

</div>

<!-- ROUTE LIST -->

<div
id="bulkRouteList"
style="
margin-top:10px;
max-height:260px;
overflow-y:auto;
padding:4px;
border-radius:18px;
background:rgba(255,255,255,.03);
border:1px solid rgba(255,255,255,.06);
">

</div>

<!-- BUTTONS -->

<button
onclick="applyBulkUpdate()"
style="
margin-top:24px;
width:100%;
">

Apply Bulk Update

</button>

<button
onclick="removeTemporaryAdjustments()"
style="
margin-top:12px;
width:100%;
background:#7f1d1d;
">

Remove Temporary Adjustments

</button>

</div>

<script type="module">

import {
  db
}
from "./firebase-config.js";

import {
  collection,
  getDocs,
  updateDoc,
  doc
}
from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

/* =========================
   SHOW LOADER
========================= */

function showLoader(){

  document.getElementById(
    "loadingOverlay"
  ).style.display =
  "flex";

}

function hideLoader(){

  document.getElementById(
    "loadingOverlay"
  ).style.display =
  "none";

}

/* =========================
   UPDATE SELECT COUNT
========================= */

function updateSelectedCount(){

  const selected =
  document.querySelectorAll(
    ".routeCheckbox:checked"
  ).length;

  document.getElementById(
    "selectedCount"
  ).innerText =

  selected + " Selected";

}

window.updateSelectedCount =
updateSelectedCount;

/* =========================
   LOAD ROUTES
========================= */

async function loadBulkRoutes(){

  const querySnapshot =
  await getDocs(

    collection(
      db,
      "routes"
    )

  );

  const container =
  document.getElementById(
    "bulkRouteList"
  );

  container.innerHTML =
  "";

  querySnapshot.forEach(docSnap => {

    const route =
    docSnap.data();

    container.innerHTML += `

<label
class="route-checkbox-item">

<input
type="checkbox"
class="routeCheckbox"
value="${docSnap.id}"
onchange="updateSelectedCount()">

${route.from}
→
${route.to}

</label>

    `;

  });

}

/* =========================
   SELECT ALL
========================= */

document.getElementById(
  "selectAllRoutes"
).addEventListener(

  "change",

  function(){

    const checked =
    this.checked;

    document
    .querySelectorAll(
      ".routeCheckbox"
    )
    .forEach(box => {

      box.checked =
      checked;

    });

    updateSelectedCount();

  }

);

/* =========================
   SEARCH
========================= */

document.getElementById(
  "routeSearch"
).addEventListener(

  "input",

  function(){

    const search =
    this.value.toLowerCase();

    const labels =
    document.querySelectorAll(
      "#bulkRouteList label"
    );

    labels.forEach(label => {

      if(

        label.innerText
        .toLowerCase()
        .includes(search)

      ){

        label.style.display =
        "flex";

      }

      else{

        label.style.display =
        "none";

      }

    });

  }

);

/* =========================
   APPLY BULK UPDATE
========================= */

async function applyBulkUpdate(){

  showLoader();

  const updateMode =
  document.getElementById(
    "updateMode"
  ).value;

  const actionType =
  document.getElementById(
    "actionType"
  ).value;

  const amount =
  Number(

    document.getElementById(
      "adjustmentAmount"
    ).value

  );

  const applyHireDay =
  document.getElementById(
    "applyHireDay"
  ).checked;

  const applyHireNight =
  document.getElementById(
    "applyHireNight"
  ).checked;

  const applySharedDay =
  document.getElementById(
    "applySharedDay"
  ).checked;

  const applySharedNight =
  document.getElementById(
    "applySharedNight"
  ).checked;

  if(!amount || amount <= 0){

    hideLoader();

    alert(
      "Please enter valid amount."
    );

    return;

  }

  let adjustment =
  amount;

  if(actionType === "decrease"){

    adjustment =
    adjustment * -1;

  }

  try{

    const querySnapshot =
    await getDocs(

      collection(
        db,
        "routes"
      )

    );

    const selectedRoutes =

    document.querySelectorAll(
      ".routeCheckbox:checked"
    );

    if(selectedRoutes.length === 0){

      hideLoader();

      alert(
        "Please select routes."
      );

      return;

    }

    for(const selected of selectedRoutes){

      const docId =
      selected.value;

      const docSnap =
      querySnapshot.docs.find(
        d => d.id === docId
      );

      if(!docSnap){

        continue;

      }

      const route =
      docSnap.data();

      const docRef =
      doc(
        db,
        "routes",
        docId
      );

      let updateData = {};

      if(updateMode === "temporary"){

        if(applyHireDay){

          updateData.tempHireDay =
          Math.max(
            0,
            Number(route.tempHireDay || 0)
            + adjustment
          );

        }

        if(applyHireNight){

          updateData.tempHireNight =
          Math.max(
            0,
            Number(route.tempHireNight || 0)
            + adjustment
          );

        }

        if(applySharedDay){

          updateData.tempSharedDay =
          Math.max(
            0,
            Number(route.tempSharedDay || 0)
            + adjustment
          );

        }

        if(applySharedNight){

          updateData.tempSharedNight =
          Math.max(
            0,
            Number(route.tempSharedNight || 0)
            + adjustment
          );

        }

      }

      else{

        if(applyHireDay){

          updateData.hireDay =
          Math.max(
            0,
            Number(route.hireDay || 0)
            + adjustment
          );

        }

        if(applyHireNight){

          updateData.hireNight =
          Math.max(
            0,
            Number(route.hireNight || 0)
            + adjustment
          );

        }

        if(applySharedDay){

          updateData.sharedDay =
          Math.max(
            0,
            Number(route.sharedDay || 0)
            + adjustment
          );

        }

        if(applySharedNight){

          updateData.sharedNight =
          Math.max(
            0,
            Number(route.sharedNight || 0)
            + adjustment
          );

        }

      }

      await updateDoc(
        docRef,
        updateData
      );

    }

    hideLoader();

    alert(
      "Bulk update applied successfully."
    );

  }

  catch(error){

    console.log(error);

    hideLoader();

    alert(
      "Unable to apply bulk update."
    );

  }

}

window.applyBulkUpdate =
applyBulkUpdate;

/* =========================
   REMOVE TEMPORARY
========================= */

async function removeTemporaryAdjustments(){

  const confirmReset =
  confirm(

    "Remove all temporary adjustments?"

  );

  if(!confirmReset){

    return;

  }

  showLoader();

  try{

    const querySnapshot =
    await getDocs(

      collection(
        db,
        "routes"
      )

    );

    for(const docSnap of querySnapshot.docs){

      const docRef =
      doc(
        db,
        "routes",
        docSnap.id
      );

      await updateDoc(

        docRef,

        {

          tempHireDay:0,
          tempHireNight:0,
          tempSharedDay:0,
          tempSharedNight:0

        }

      );

    }

    hideLoader();

    alert(
      "Temporary adjustments removed."
    );

  }

  catch(error){

    console.log(error);

    hideLoader();

    alert(
      "Unable to remove temporary adjustments."
    );

  }

}

window.removeTemporaryAdjustments =
removeTemporaryAdjustments;

/* =========================
   INITIAL LOAD
========================= */

loadBulkRoutes();

</script>

</body>

</html>
