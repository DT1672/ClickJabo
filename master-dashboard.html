<!DOCTYPE html>
<html>

<head>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<meta
name="theme-color"
content="#020817">

<title>
Master Dashboard
</title>

<link
rel="stylesheet"
href="admin.css">

<script
type="module"
src="master-auth-check.js">
</script>

<style>

body{

  margin:0;

  background:
  radial-gradient(
    circle at top,
    #071120,
    #020817 55%
  );

  color:white;

  font-family:Arial,sans-serif;

  overflow:hidden;

}

.page-loader{

  position:fixed;

  top:0;
  left:0;

  width:100%;
  height:100%;

  background:
  rgba(2,8,23,.72);

  backdrop-filter:blur(6px);

  display:none;

  justify-content:center;
  align-items:center;

  z-index:99999;

}

.loader-spinner{

  width:62px;
  height:62px;

  border-radius:50%;

  border:
  4px solid rgba(255,255,255,.08);

  border-top:
  4px solid #c29b47;

  animation:
  spin .8s linear infinite;

}

@keyframes spin{

  from{

    transform:
    rotate(0deg);

  }

  to{

    transform:
    rotate(360deg);

  }

}

.master-layout{

  display:flex;

  width:100%;

  height:100vh;

}

/* =========================
   SIDEBAR
========================= */

.sidebar{

  width:220px;

  background:
  rgba(15,23,42,.88);

  backdrop-filter:blur(20px);

  border-right:
  1px solid rgba(255,255,255,.06);

  display:flex;

  flex-direction:column;

  padding:20px 16px;

  box-sizing:border-box;

}

.logo{

  font-size:24px;

  font-weight:700;

  margin-bottom:32px;

  letter-spacing:.4px;

}

.sidebar button{

  width:100%;

  min-height:48px;

  border:none;

  border-radius:18px;

  margin-bottom:10px;

  background:
  rgba(255,255,255,.03);

  border:
  1px solid rgba(255,255,255,.05);

  color:#e2e8f0;

  font-size:14px;

  font-weight:600;

  text-align:left;

  padding:0 16px;

  cursor:pointer;

  transition:.25s;

}

.sidebar button:hover{

  background:
  rgba(255,255,255,.07);

  transform:
  translateX(2px);

}

/* =========================
   MAIN PANEL
========================= */

.main-panel{

  flex:1;

  overflow-y:auto;

  padding:24px;

  box-sizing:border-box;

}

/* =========================
   HEADER
========================= */

.top-header{

  display:flex;

  justify-content:space-between;

  align-items:center;

  margin-bottom:22px;

}

.page-title{

  font-size:32px;

  font-weight:700;

  line-height:1;

}

.page-subtitle{

  margin-top:6px;

  color:#94a3b8;

  font-size:13px;

  letter-spacing:.4px;

}

.status-box{

  padding:10px 16px;

  border-radius:999px;

  background:
  rgba(34,197,94,.12);

  border:
  1px solid rgba(34,197,94,.18);

  color:#4ade80;

  font-size:12px;

  font-weight:600;

}

/* =========================
   GRID
========================= */

.card-grid{

  display:grid;

  grid-template-columns:
  repeat(
    auto-fit,
    minmax(220px,1fr)
  );

  gap:16px;

}

/* =========================
   CARDS
========================= */

.dashboard-card{

  background:
  linear-gradient(
    135deg,
    rgba(15,23,42,.94),
    rgba(15,23,42,.82)
  );

  border:
  1px solid rgba(255,255,255,.05);

  border-radius:26px;

  padding:22px;

  backdrop-filter:blur(16px);

  box-shadow:
  0 10px 32px rgba(0,0,0,.22);

  position:relative;

  overflow:hidden;

}

.dashboard-card::before{

  content:"";

  position:absolute;

  top:0;
  left:0;

  width:100%;
  height:3px;

  background:
  linear-gradient(
    90deg,
    #c29b47,
    rgba(250,204,21,.2)
  );

  opacity:.85;

}

.dashboard-card:hover{

  transform:
  translateY(-2px);

  transition:.25s;

  border:
  1px solid rgba(250,204,21,.10);

}

.dashboard-card h1{

  text-shadow:
  0 0 24px rgba(250,204,21,.08);

}

.dashboard-card h3{

  margin:0;

  font-size:13px;

  font-weight:600;

  color:#94a3b8;

  letter-spacing:.3px;

}

.dashboard-card h1{

  margin-top:14px;

  margin-bottom:0;

  font-size:36px;

  font-weight:700;

  line-height:1;

}

/* =========================
   ACTIVITY CARD
========================= */

.activity-card{

  grid-column:
  span 2;

  min-height:280px;

}

/* =========================
   SCROLLBAR
========================= */

.main-panel::-webkit-scrollbar{

  width:8px;

}

.main-panel::-webkit-scrollbar-thumb{

  background:
  rgba(255,255,255,.08);

  border-radius:999px;

}

/* =========================
   MOBILE
========================= */

@media(max-width:900px){

  .master-layout{

    flex-direction:column;

  }

  .sidebar{

    width:100%;

    height:auto;

    flex-direction:row;

    overflow-x:auto;

    gap:10px;

    padding:12px;

  }

  .logo{

    display:none;

  }

  .sidebar button{

    min-width:160px;

    margin-bottom:0;

  }

  .top-header{

    flex-direction:column;

    align-items:flex-start;

    gap:12px;

  }

  .activity-card{

    grid-column:
    span 1;

  }

}

</style>

</head>

<body>

<!-- LOADER -->

<div class="page-loader" id="globalLoader">

  <div class="loader-spinner"></div>

</div>

<div class="master-layout">

<!-- SIDEBAR -->

<div class="sidebar">

  <div class="logo">

    ClickJabo

  </div>

  <button
  style="
  background:
  linear-gradient(
    135deg,
    rgba(194,155,71,.24),
    rgba(250,204,21,.12)
  );

  border:
  1px solid rgba(250,204,21,.24);

  color:white;
  ">

    ⌂ Dashboard

  </button>

  <button
  onclick="
  window.location.href=
  'master-districts.html'
  ">

    🏙 Districts

  </button>

  <button
  onclick="
  window.location.href=
  'master-admins.html'
  ">

    👤 Admin Accounts

  </button>

  <button>

    📈 Fare Analytics

  </button>

  <button
  onclick="
  window.location.href=
  'master-vehicle-categories.html'
  ">

    🚕 Vehicle Categories

  </button>

  <button
onclick="
window.location.href=
'master-sponsors.html'
">

  📢 Sponsors

</button>

  <button>

    📑 Reports

  </button>

  <div
  style="
  flex:1;
  ">

  </div>

  <button
  onclick="logoutMaster()"
  style="
  background:
  rgba(220,38,38,.12);

  border:
  1px solid rgba(220,38,38,.18);

  color:#fca5a5;
  ">

    ⎋ Logout

  </button>

</div>

<!-- MAIN -->

<div class="main-panel">

<div class="top-header">

  <div>

    <div class="page-title">

      Master Dashboard

    </div>

    <div class="page-subtitle">

      CLICKJABO PLATFORM CONTROL CENTER

    </div>

  </div>

  <div class="status-box">

    ● System Active

  </div>

</div>

<div class="card-grid">

  <div class="dashboard-card">

    <h3>
      Total Districts
    </h3>

    <h1 id="districtCount">
      0
    </h1>

  </div>

  <div class="dashboard-card">

    <h3>
      Total Routes
    </h3>

    <h1 id="routeCount">
      0
    </h1>

  </div>

  <div class="dashboard-card">

    <h3>
      Active Admins
    </h3>

    <h1 id="adminCount">
      0
    </h1>

  </div>

  <div class="dashboard-card">

    <h3>
      System Status
    </h3>

    <h1>
      LIVE
    </h1>

  </div>

  <div class="dashboard-card">

    <h3>
      Temporary Adjustments
    </h3>

    <h1 id="temporaryCount">
      0
    </h1>

  </div>

  <div class="dashboard-card">

    <h3>
      Sponsors
    </h3>

    <h1 id="sponsorCount">
      0
    </h1>

  </div>

  <div class="dashboard-card">

    <h3>
      Notices
    </h3>

    <h1 id="noticeCount">
      0
    </h1>

  </div>

  <div class="dashboard-card">

    <h3>
      Last Sync
    </h3>

    <h1 id="lastSync">
      --
    </h1>

  </div>

  <div class="dashboard-card activity-card">

    <h3>
      Recent Activities
    </h3>

    <div
    id="activityList"
    style="
    margin-top:18px;
    display:flex;
    flex-direction:column;
    gap:12px;
    ">

      <div
      style="
      color:#94a3b8;
      font-size:14px;
      ">

        No recent activity

      </div>

    </div>

  </div>

</div>

</div>

</div>

<script type="module">

import {
  db,
  auth
}
from "./firebase-config.js";

import {
  collection,
  onSnapshot,
  query,
  orderBy,
  limit
}
from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

import {
  signOut
}
from "https://www.gstatic.com/firebasejs/12.3.0/firebase-auth.js";

/* =========================
   LOADER
========================= */

function showLoader(){

  document.getElementById(
    "globalLoader"
  ).style.display =

  "flex";

}

function hideLoader(){

  document.getElementById(
    "globalLoader"
  ).style.display =

  "none";

}

/* =========================
   LOGOUT
========================= */

async function logoutMaster(){

  try{

    showLoader();

    await signOut(auth);

    localStorage.removeItem(
      "masterLoggedIn"
    );

    window.location.href =

    "master-login.html";

  }

  catch(error){

    hideLoader();

    console.log(error);

    alert(
      "Logout failed."
    );

  }

}

window.logoutMaster =
logoutMaster;

/* =========================
   LOAD DASHBOARD
========================= */

async function loadDashboardCounts(){

  try{

    showLoader();

    document.getElementById(
      "districtCount"
    ).innerText = 1;

    onSnapshot(

      collection(
        db,
        "routes"
      ),

      (snapshot)=>{

        document.getElementById(
          "routeCount"
        ).innerText =

        snapshot.size;

      }

    );

    onSnapshot(

      collection(
        db,
        "districtAdmins"
      ),

      (snapshot)=>{

        document.getElementById(
          "adminCount"
        ).innerText =

        snapshot.size;

      }

    );

    onSnapshot(

      collection(
        db,
        "temporaryAdjustments"
      ),

      (snapshot)=>{

        document.getElementById(
          "temporaryCount"
        ).innerText =

        snapshot.size;

      }

    );

    onSnapshot(

      collection(
        db,
        "sponsors"
      ),

      (snapshot)=>{

        document.getElementById(
          "sponsorCount"
        ).innerText =

        snapshot.size;

      }

    );

    onSnapshot(

      collection(
        db,
        "notices"
      ),

      (snapshot)=>{

        document.getElementById(
          "noticeCount"
        ).innerText =

        snapshot.size;

      }

    );

    const activityQuery = query(

      collection(
        db,
        "activityLogs"
      ),

      orderBy(
        "createdAt",
        "desc"
      ),

      limit(5)

    );

    onSnapshot(

      activityQuery,

      (snapshot)=>{

        const activityList =

        document.getElementById(
          "activityList"
        );

        activityList.innerHTML = "";

        if(snapshot.empty){

          activityList.innerHTML =

          `
          <div
          style="
          color:#94a3b8;
          font-size:14px;
          ">
            No recent activity
          </div>
          `;

          return;

        }

        snapshot.forEach((doc)=>{

          const data = doc.data();

          activityList.innerHTML +=

          `
          <div
          style="
          background:rgba(255,255,255,.04);
          padding:12px;
          border-radius:12px;
          font-size:14px;
          ">

            ${data.action || "Activity"}

          </div>
          `;

        });

      }

    );

    document.getElementById(
      "lastSync"
    ).innerText =

    new Date().toLocaleTimeString();

    hideLoader();

  }

  catch(error){

    hideLoader();

    console.log(error);

  }

}

loadDashboardCounts();

</script>

</body>

</html>
