<!DOCTYPE html>
<html>

<head>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<meta
name="theme-color"
content="#020817">

<title>
Master Districts
</title>

<link
rel="stylesheet"
href="admin.css">

<script
type="module"
src="master-auth-check.js">
</script>

<style>

body{
margin:0;
background:#020817;
color:white;
font-family:sans-serif;
}

/* =========================
   LOADER
========================= */

.page-loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
rgba(2,8,23,.72);
backdrop-filter:blur(6px);
display:none;
justify-content:center;
align-items:center;
z-index:99999;
}

.loader-spinner{
width:62px;
height:62px;
border-radius:50%;
border:
4px solid rgba(255,255,255,.08);
border-top:
4px solid #c29b47;
animation:
spin .8s linear infinite;
}

@keyframes spin{

from{
transform:rotate(0deg);
}

to{
transform:rotate(360deg);
}

}

/* =========================
   TOP BAR
========================= */

.top-bar{
display:flex;
align-items:center;
justify-content:space-between;
position:fixed;
top:0;
left:0;
width:100%;
height:70px;
padding:0 24px;
box-sizing:border-box;
z-index:2000;
background:
rgba(10,15,25,.78);
backdrop-filter:blur(18px);
border-bottom:
1px solid rgba(255,255,255,.05);
}

/* =========================
   MAIN
========================= */

.main-container{
width:100%;
max-width:1450px;
margin:auto;
padding:
100px 24px 60px 24px;
box-sizing:border-box;
}

/* =========================
   STATS
========================= */

.stats-grid{
display:grid;
grid-template-columns:
repeat(
auto-fit,
minmax(220px,1fr)
);
gap:16px;
margin-bottom:24px;
}

.stats-card{
background:
rgba(255,255,255,.04);
border:
1px solid rgba(255,255,255,.06);
border-radius:24px;
padding:20px;
backdrop-filter:blur(16px);
min-height:110px;
box-sizing:border-box;
}

.stats-label{
font-size:12px;
color:#94a3b8;
}

.stats-value{
font-size:32px;
font-weight:700;
margin-top:12px;
}

/* =========================
   DISTRICT LIST
========================= */

.district-list{
display:flex;
flex-direction:column;
gap:14px;
}

.district-row{
display:flex;
align-items:center;
justify-content:space-between;
gap:20px;
padding:20px;
border-radius:24px;
background:
rgba(255,255,255,.04);
border:
1px solid rgba(255,255,255,.06);
backdrop-filter:blur(16px);
flex-wrap:wrap;
}

.district-left{
display:flex;
flex-direction:column;
gap:6px;
min-width:220px;
}

.district-name{
font-size:18px;
font-weight:700;
}

.district-meta{
font-size:12px;
color:#94a3b8;
}

.district-stats{
display:flex;
align-items:center;
gap:14px;
flex-wrap:wrap;
}

.stat-pill{
padding:10px 14px;
border-radius:16px;
background:
rgba(255,255,255,.03);
border:
1px solid rgba(255,255,255,.04);
font-size:12px;
color:#cbd5e1;
}

.status-pill{
padding:8px 12px;
border-radius:999px;
font-size:11px;
font-weight:600;
}

.status-active{
background:
rgba(34,197,94,.12);
border:
1px solid rgba(34,197,94,.24);
color:#86efac;
}

.status-disabled{
background:
rgba(239,68,68,.12);
border:
1px solid rgba(239,68,68,.24);
color:#fca5a5;
}

.open-btn{
height:38px;
padding:0 16px;
border:none;
border-radius:14px;
background:
linear-gradient(
135deg,
#8b6b2e,
#c29b47
);
color:white;
font-size:12px;
font-weight:600;
cursor:pointer;
}

/* =========================
   MOBILE
========================= */

@media(max-width:768px){

.top-bar{
padding:0 16px;
}

.main-container{
padding:
90px 16px 40px 16px;
}

.district-row{
flex-direction:column;
align-items:flex-start;
}

.district-stats{
width:100%;
}

}

</style>

</head>

<body>

<!-- LOADER -->

<div
class="page-loader"
id="globalLoader">

<div
class="loader-spinner">
</div>

</div>

<!-- TOP BAR -->

<div class="top-bar">

<div
style="
display:flex;
align-items:center;
gap:14px;
">

<button
onclick="
window.location.href=
'master-dashboard.html'
"
style="
width:40px;
height:40px;
border:none;
border-radius:14px;
background:
rgba(255,255,255,.06);
border:
1px solid rgba(255,255,255,.08);
color:white;
font-size:18px;
cursor:pointer;
">

←

</button>

<div>

<div
style="
font-size:18px;
font-weight:700;
">

District Monitoring

</div>

<div
style="
font-size:11px;
color:#94a3b8;
margin-top:2px;
letter-spacing:1px;
">

CLICKJABO MASTER PANEL

</div>

</div>

</div>

</div>

<!-- MAIN -->

<div class="main-container">

<!-- STATS -->

<div class="stats-grid">

<div class="stats-card">

<div class="stats-label">

Total Districts

</div>

<div
id="totalDistricts"
class="stats-value">

0

</div>

</div>

<div class="stats-card">

<div class="stats-label">

Active Districts

</div>

<div
id="activeDistricts"
class="stats-value">

0

</div>

</div>

<div class="stats-card">

<div class="stats-label">

Total Routes

</div>

<div
id="totalRoutes"
class="stats-value">

0

</div>

</div>

</div>

<!-- DISTRICT LIST -->

<div
id="districtList"
class="district-list">

</div>

</div>

<script type="module">

import {
db
}
from "./firebase-config.js";

import {
collection,
getDocs,
query,
where
}
from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

/* =========================
   LOADER
========================= */

function showLoader(){

document.getElementById(
"globalLoader"
).style.display =
"flex";

}

function hideLoader(){

document.getElementById(
"globalLoader"
).style.display =
"none";

}

/* =========================
   OPEN DISTRICT
========================= */

function openDistrict(
districtID
){

window.location.href =
`master-district-details.html?id=${districtID}`;

}

window.openDistrict =
openDistrict;

/* =========================
   LOAD DISTRICTS
========================= */

async function loadDistricts(){

try{

showLoader();

const container =
document.getElementById(
"districtList"
);

container.innerHTML = "";

const districtSnapshot =

await getDocs(
collection(db,"districts")
);

const routesSnapshot =

await getDocs(
collection(db,"routes")
);

document.getElementById(
"totalDistricts"
).innerText =
districtSnapshot.size;

document.getElementById(
"totalRoutes"
).innerText =
routesSnapshot.size;

let activeCount = 0;

if(districtSnapshot.empty){

container.innerHTML =

`
<div
style="
color:#94a3b8;
font-size:14px;
">

No districts found.

</div>
`;

hideLoader();
return;

}

for(const docSnap of districtSnapshot.docs){

const district =
docSnap.data();

if(district.isActive !== false){
activeCount++;
}

const routeQuery =

query(

collection(db,"routes"),

where(
"districtID",
"==",
district.districtID
)

);

const routeSnapshot =
await getDocs(routeQuery);

const pricingQuery =

query(

collection(
db,
"routeVehiclePricing"
),

where(
"districtID",
"==",
district.districtID
)

);

const pricingSnapshot =
await getDocs(pricingQuery);

const providerSet =
new Set();

pricingSnapshot.forEach(p => {

const data =
p.data();

if(data.providerID){

providerSet.add(
data.providerID
);

}

});

container.innerHTML += `

<div class="district-row">

<div class="district-left">

<div class="district-name">

${district.name || "-"}

</div>

<div class="district-meta">

${district.districtID || "-"}

•

${district.helplineNumber || "-"}

</div>

</div>

<div class="district-stats">

<div class="stat-pill">

Routes
<b>

${routeSnapshot.size}

</b>

</div>

<div class="stat-pill">

Providers
<b>

${providerSet.size}

</b>

</div>

<div class="status-pill
${district.isActive !== false
? "status-active"
: "status-disabled"}
">

${district.isActive !== false
? "ACTIVE"
: "DISABLED"}

</div>

</div>

<button
class="open-btn"

onclick="
openDistrict(
'${district.districtID}'
)
">

Open District

</button>

</div>

`;

}

document.getElementById(
"activeDistricts"
).innerText =
activeCount;

hideLoader();

}

catch(error){

hideLoader();

console.log(error);

alert(
"Failed to load districts."
);

}

}

loadDistricts();

</script>

</body>

</html>
