<!DOCTYPE html>
<html>

<head>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<meta
name="theme-color"
content="#020817">

<title>
Admin Dashboard
</title>

<link
rel="stylesheet"
href="admin.css">

<link
rel="manifest"
href="admin-manifest.json">

<script
type="module"
src="auth-check.js">
</script>

</head>

<body>

<!-- TOP BAR -->

<div class="top-bar">

  <span class="top-title">

    Dashboard

  </span>

  <div class="top-user">

    dimapur_admin

  </div>

</div>

<!-- MAIN -->

<div class="dashboard-container">

  <!-- HEADER -->

  <div class="dashboard-header">

    <h1>
      ClickJabo
    </h1>

    <p>
      DISTRICT CONTROL PANEL
    </p>

    <div class="district-badge">

      DISTRICT:
      DIMAPUR

    </div>

  </div>

  <!-- STATS -->

  <div class="stats-grid">

    <div class="stat-card">

      <h2 id="routeCount">

        0

      </h2>

      <p>
        Routes
      </p>

    </div>

    <div class="stat-card">

      <h2>
        Online
      </h2>

      <p>
        Status
      </p>

    </div>

    <div class="stat-card">

      <h2 id="lastUpdated">

        --

      </h2>

      <p>
        Updated
      </p>

    </div>

  </div>

  <!-- QUICK ACTIONS -->

  <div class="route-section">

    <div class="route-title">

      Quick Actions

    </div>

    <div class="route-list">

      <!-- FARE ENTRY -->

      <div class="route-item">

        <div class="route-info">

          <strong>
            Fare Entry
          </strong>

          <p>
            Update district fares
          </p>

        </div>

        <div class="route-actions">

          <a
          href="fare-entry.html"
          class="edit-btn"
          style="
          text-decoration:none;
          text-align:center;">

            Open

          </a>

        </div>

      </div>

      <!-- ROUTE LIST -->

      <div class="route-item">

        <div class="route-info">

          <strong>
            Route List
          </strong>

          <p>
            Search and manage routes
          </p>

        </div>

        <div class="route-actions">

          <a
          href="route-list.html"
          class="edit-btn"
          style="
          text-decoration:none;
          text-align:center;">

            Open

          </a>

        </div>

      </div>

      <!-- SETTINGS -->

      <div class="route-item">

        <div class="route-info">

          <strong>
            Settings
          </strong>

          <p>
            Configure admin panel
          </p>

        </div>

        <div class="route-actions">

          <a
          href="settings.html"
          class="edit-btn"
          style="
          text-decoration:none;
          text-align:center;">

            Open

          </a>

        </div>

      </div>

      <!-- LOGOUT -->

      <div class="route-item">

        <div class="route-info">

          <strong>
            Logout
          </strong>

          <p>
            Exit admin session
          </p>

        </div>

        <div class="route-actions">

          <a
          href="admin-login.html"
          class="delete-btn"
          style="
          text-decoration:none;
          text-align:center;">

            Exit

          </a>

        </div>

      </div>

    </div>

  </div>

</div>

<script type="module">

import {
  db
}
from "./firebase-config.js";

import {
  collection,
  getDocs
}
from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

/* =========================
   DASHBOARD STATS
========================= */

async function loadDashboardStats(){

  const querySnapshot =
  await getDocs(

    collection(
      db,
      "routes"
    )

  );

  /* ROUTE COUNT */

  document.getElementById(
    "routeCount"
  ).innerHTML =
  querySnapshot.size;

  /* LAST UPDATED */

  let latestDate =
  null;

  querySnapshot.forEach(docSnap => {

    const route =
    docSnap.data();

    if(route.updatedAt){

      const routeDate =
      route.updatedAt.toDate();

      if(

        !latestDate ||

        routeDate > latestDate

      ){

        latestDate =
        routeDate;

      }

    }

  });

  if(latestDate){

    document.getElementById(
      "lastUpdated"
    ).innerHTML =

    latestDate.toLocaleDateString(

      "en-GB",

      {

        day:"2-digit",
        month:"short"

      }

    );

  }

}

loadDashboardStats();

</script>

</body>

</html>
