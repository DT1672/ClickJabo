<!DOCTYPE html>
<html>

<head>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<meta
name="theme-color"
content="#020817">

<title>
Master Admins
</title>

<script
type="module"
src="master-auth-check.js">
</script>

<style>

body{

  margin:0;

  background:
  radial-gradient(
    circle at top,
    #071120,
    #020817 55%
  );

  color:white;

  font-family:Arial,sans-serif;

}

/* =========================
   LOADER
========================= */

.page-loader{

  position:fixed;

  top:0;
  left:0;

  width:100%;
  height:100%;

  background:
  rgba(2,8,23,.72);

  backdrop-filter:blur(6px);

  display:none;

  justify-content:center;
  align-items:center;

  z-index:99999;

}

.loader-spinner{

  width:62px;
  height:62px;

  border-radius:50%;

  border:
  4px solid rgba(255,255,255,.08);

  border-top:
  4px solid #c29b47;

  animation:
  spin .8s linear infinite;

}

@keyframes spin{

  from{

    transform:
    rotate(0deg);

  }

  to{

    transform:
    rotate(360deg);

  }

}

.page-container{

  max-width:1200px;

  margin:auto;

  padding:32px;

  box-sizing:border-box;

}

.top-header{

  margin-bottom:24px;

}

.page-title{

  font-size:32px;

  font-weight:700;

}

.page-subtitle{

  margin-top:6px;

  color:#94a3b8;

  font-size:13px;

  letter-spacing:.4px;

}

.dashboard-card{

  background:
  linear-gradient(
    135deg,
    rgba(15,23,42,.94),
    rgba(15,23,42,.82)
  );

  border:
  1px solid rgba(255,255,255,.05);

  border-radius:26px;

  padding:24px;

  margin-bottom:20px;

  backdrop-filter:blur(16px);

  box-shadow:
  0 10px 32px rgba(0,0,0,.22);

}

.form-grid{

  display:grid;

  grid-template-columns:
  repeat(
    auto-fit,
    minmax(220px,1fr)
  );

  gap:14px;

}

input,
select{

  width:100%;

  height:48px;

  border:none;

  border-radius:16px;

  padding:0 14px;

  box-sizing:border-box;

  background:
  rgba(255,255,255,.04);

  border:
  1px solid rgba(255,255,255,.06);

  color:white;

  font-size:14px;

  outline:none;

}

input:disabled{

  opacity:.6;

  cursor:not-allowed;

}

select{

  cursor:pointer;

}

option{

  background:#0f172a;

}

.create-btn{

  margin-top:18px;

  width:100%;

  height:50px;

  border:none;

  border-radius:18px;

  background:
  linear-gradient(
    135deg,
    #8b6b2e,
    #c29b47
  );

  color:white;

  font-size:15px;

  font-weight:700;

  cursor:pointer;

}

.admin-item{

  display:flex;

  justify-content:space-between;

  align-items:center;

  padding:16px;

  border-radius:18px;

  background:
  rgba(255,255,255,.03);

  border:
  1px solid rgba(255,255,255,.05);

  margin-bottom:12px;

}

.admin-left{

  display:flex;

  flex-direction:column;

  gap:4px;

}

.admin-email{

  font-size:15px;

  font-weight:600;

}

.admin-meta{

  font-size:12px;

  color:#94a3b8;

}

.action-wrap{

  display:flex;

  align-items:center;

  gap:10px;

}

.action-btn{

  height:36px;

  padding:0 14px;

  border:none;

  border-radius:12px;

  font-size:12px;

  cursor:pointer;

  color:white;

}

.edit-btn{

  background:
  rgba(255,255,255,.06);

}

.disable-btn{

  background:
  rgba(220,38,38,.12);

  color:#fca5a5;

}

.enable-btn{

  background:
  rgba(34,197,94,.12);

  color:#86efac;

}

@media(max-width:768px){

  .page-container{

    padding:18px;

  }

  .admin-item{

    flex-direction:column;

    align-items:flex-start;

    gap:14px;

  }

}

</style>

</head>

<body>

<!-- LOADER -->

<div
class="page-loader"
id="globalLoader">

  <div
  class="loader-spinner">

  </div>

</div>

<div class="page-container">

  <!-- HEADER -->

  <div class="top-header">

    <div
    style="
    display:flex;
    align-items:center;
    gap:14px;
    ">

      <button
      onclick="
      window.location.href=
      'master-dashboard.html'
      "
      style="
      width:42px;
      height:42px;
      border:none;
      border-radius:14px;
      background:
      rgba(255,255,255,.05);

      border:
      1px solid rgba(255,255,255,.06);

      color:white;

      font-size:18px;

      cursor:pointer;
      ">

        ←

      </button>

      <div>

        <div class="page-title">

          Admin Management

        </div>

        <div class="page-subtitle">

          CREATE & CONTROL DISTRICT ADMINS

        </div>

      </div>

    </div>

  </div>

  <!-- CREATE ADMIN -->

  <div class="dashboard-card">

    <h3
    style="
    margin-bottom:20px;
    ">

      Create Admin

    </h3>

    <div class="form-grid">

      <input
      type="text"
      id="adminUserID"
      placeholder="Admin User ID">

      <input
      type="text"
      id="adminName"
      placeholder="Admin Name">

      <input
      type="password"
      id="adminPassword"
      placeholder="Password">

      <input
      type="text"
      id="adminDistrict"
      placeholder="District">

      <input
      type="text"
      id="adminVehicle"
      placeholder="Vehicle Category">

      <input
      type="text"
      id="adminProvider"
      placeholder="Service Provider">

      <select id="adminPlan">

        <option>
          Free
        </option>

        <option>
          3 Months
        </option>

        <option>
          6 Months
        </option>

        <option>
          Yearly
        </option>

      </select>

    </div>

    <button
    class="create-btn"
    onclick="createAdmin()">

      Create Admin

    </button>

  </div>

  <!-- ADMIN LIST -->

  <div class="dashboard-card">

    <h3
    style="
    margin-bottom:20px;
    ">

      Active Admins

    </h3>

    <div id="adminList">

      No admins found.

    </div>

  </div>

</div>

<script type="module">

import {
  db,
  auth
}
from "./firebase-config.js";

import {
  collection,
  onSnapshot,
  doc,
  setDoc
}
from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

import {
  createUserWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/12.3.0/firebase-auth.js";

/* =========================
   LOADER
========================= */

function showLoader(){

  const loader =

  document.getElementById(
    "globalLoader"
  );

  if(loader){

    loader.style.display =
    "flex";

  }

}

function hideLoader(){

  const loader =

  document.getElementById(
    "globalLoader"
  );

  if(loader){

    loader.style.display =
    "none";

  }

}

/* =========================
   CREATE / UPDATE ADMIN
========================= */

async function createAdmin(){

  try{

    showLoader();

    const userID =

    document.getElementById(
      "adminUserID"
    ).value.trim();

    const adminName =

    document.getElementById(
      "adminName"
    ).value.trim();

    const email =

    userID +
    "@clickjabo.com";

    const password =

    document.getElementById(
      "adminPassword"
    ).value.trim();

    const district =

    document.getElementById(
      "adminDistrict"
    ).value.trim();

    const vehicleCategory =

    document.getElementById(
      "adminVehicle"
    ).value.trim();

    const serviceProvider =

    document.getElementById(
      "adminProvider"
    ).value.trim();

    const planType =

    document.getElementById(
      "adminPlan"
    ).value;

    let expiryDate = null;

    if(planType === "3 Months"){

      expiryDate =

      new Date(

        Date.now() +

        90 * 24 * 60 * 60 * 1000

      );

    }

    else if(planType === "6 Months"){

      expiryDate =

      new Date(

        Date.now() +

        180 * 24 * 60 * 60 * 1000

      );

    }

    else if(planType === "Yearly"){

      expiryDate =

      new Date(

        Date.now() +

        365 * 24 * 60 * 60 * 1000

      );

    }

    if(

      userID === "" ||

      adminName === "" ||

      district === ""

    ){

      hideLoader();

      alert(
        "Please fill all required fields."
      );

      return;

    }

    /* UPDATE ADMIN */

    if(window.editingAdminID){

      await setDoc(

        doc(
          db,
          "districtAdmins",
          window.editingAdminID
        ),

        {

          name:
          adminName,

          district:
          district,

          vehicleCategory:
          vehicleCategory,

          serviceProvider:
          serviceProvider,

          planType:
          planType,

          expiryDate:
          expiryDate,

          updatedAt:
          new Date()

        },

        {

          merge:true

        }

      );

      alert(
        "Admin updated successfully."
      );

      window.editingAdminID =
      null;

    }

    /* CREATE ADMIN */

    else{

      if(password === ""){

        hideLoader();

        alert(
          "Password required."
        );

        return;

      }

      const userCredential =

      await createUserWithEmailAndPassword(

        auth,
        email,
        password

      );

      const user =
      userCredential.user;

      await setDoc(

        doc(
          db,
          "districtAdmins",
          user.uid
        ),

        {

          name:
          adminName,

          userID:
          userID,

          email:
          email,

          district:
          district,

          vehicleCategory:
          vehicleCategory,

          serviceProvider:
          serviceProvider,

          planType:
          planType,

          expiryDate:
          expiryDate,

          isActive:true,

          createdAt:
          new Date()

        }

      );

      alert(
        "Admin created successfully."
      );

    }

    hideLoader();

    document.getElementById(
      "adminUserID"
    ).value = "";

    document.getElementById(
      "adminUserID"
    ).disabled = false;

    document.getElementById(
      "adminName"
    ).value = "";

    document.getElementById(
      "adminPassword"
    ).value = "";

    document.getElementById(
      "adminDistrict"
    ).value = "";

    document.getElementById(
      "adminVehicle"
    ).value = "";

    document.getElementById(
      "adminProvider"
    ).value = "";

    document.querySelector(
      ".create-btn"
    ).innerText =

    "Create Admin";

  }

  catch(error){

    hideLoader();

    console.log(error);

    alert(
      error.message
    );

  }

}

window.createAdmin =
createAdmin;

/* =========================
   LOAD ADMINS
========================= */

function loadAdmins(){

  onSnapshot(

    collection(
      db,
      "districtAdmins"
    ),

    (snapshot)=>{

      const adminList =

      document.getElementById(
        "adminList"
      );

      adminList.innerHTML =
      "";

      if(snapshot.empty){

        adminList.innerHTML =

        "No admins found.";

        return;

      }

      snapshot.forEach(docSnap => {

        const data =
        docSnap.data();

        adminList.innerHTML += `

        <div class="admin-item">

          <div class="admin-left">

            <div class="admin-email">

              ${data.userID || "No User ID"}

            </div>

            <div class="admin-meta">

              ${data.district || "No District"}

              •

              ${data.vehicleCategory || "No Vehicle"}

              •

              ${data.planType || "No Plan"}

            </div>

          </div>

          <div class="action-wrap">

            <button
            class="action-btn edit-btn"
            onclick="
            editAdmin(
            '${docSnap.id}',
            '${data.userID || ""}',
            '${data.name || ""}',
            '${data.district || ""}',
            '${data.vehicleCategory || ""}',
            '${data.serviceProvider || ""}',
            '${data.planType || ""}'
            )
            ">

              Edit

            </button>

            <button
            class="action-btn
            ${data.isActive
            ? "disable-btn"
            : "enable-btn"}"

            onclick="
            toggleAdminStatus(
            '${docSnap.id}',
            ${data.isActive}
            )
            ">

              ${data.isActive
              ? "Disable"
              : "Activate"}

            </button>

          </div>

        </div>

        `;

      });

    }

  );

}

/* =========================
   EDIT ADMIN
========================= */

function editAdmin(

  id,
  userID,
  name,
  district,
  vehicle,
  provider,
  plan

){

  window.editingAdminID =
  id;

  document.getElementById(
    "adminUserID"
  ).value =
  userID;

  document.getElementById(
    "adminUserID"
  ).disabled = true;

  document.getElementById(
    "adminName"
  ).value =
  name;

  document.getElementById(
    "adminDistrict"
  ).value =
  district;

  document.getElementById(
    "adminVehicle"
  ).value =
  vehicle;

  document.getElementById(
    "adminProvider"
  ).value =
  provider;

  document.getElementById(
    "adminPlan"
  ).value =
  plan;

  document.querySelector(
    ".create-btn"
  ).innerText =

  "Update Admin";

}

window.editAdmin =
editAdmin;

/* =========================
   TOGGLE STATUS
========================= */

async function toggleAdminStatus(

  id,
  currentStatus

){

  try{

    showLoader();

    await setDoc(

      doc(
        db,
        "districtAdmins",
        id
      ),

      {

        isActive:
        !currentStatus

      },

      {

        merge:true

      }

    );

    hideLoader();

  }

  catch(error){

    hideLoader();

    console.log(error);

    alert(
      error.message
    );

  }

}

window.toggleAdminStatus =
toggleAdminStatus;

loadAdmins();

</script>

</body>

</html>
