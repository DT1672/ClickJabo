<script type="module">

import {
  db,
  auth
}
from "./firebase-config.js";

import {
  collection,
  onSnapshot,
  doc,
  setDoc,
  getDocs,
  serverTimestamp
}
from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

import {
  createUserWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/12.3.0/firebase-auth.js";

/* =========================
   LOADER
========================= */

function showLoader(){

  const loader =

  document.getElementById(
    "globalLoader"
  );

  if(loader){

    loader.style.display =
    "flex";

  }

}

function hideLoader(){

  const loader =

  document.getElementById(
    "globalLoader"
  );

  if(loader){

    loader.style.display =
    "none";

  }

}

/* =========================
   LOAD DISTRICTS
========================= */

async function loadDistrictOptions(){

try{

const snapshot =

await getDocs(

collection(
db,
"districts"
)

);

const districtSelect =

document.getElementById(
"adminDistrict"
);

districtSelect.innerHTML =

`
<option value="">
Select District
</option>
`;

snapshot.forEach(docSnap => {

const data =
docSnap.data();

districtSelect.innerHTML +=

`
<option
value="${data.districtID}"

data-name="${data.name}"
>

${data.name}
(${data.districtID})

</option>
`;

});

}

catch(error){

console.log(error);

}

}

/* =========================
   LOAD VEHICLES
========================= */

async function loadVehicleOptions(){

try{

const snapshot =

await getDocs(

collection(
db,
"vehicles"
)

);

const vehicleSelect =

document.getElementById(
"vehicleSelect"
);

vehicleSelect.innerHTML =

`
<option value="">
Select Vehicle
</option>
`;

snapshot.forEach(docSnap => {

const data =
docSnap.data();

vehicleSelect.innerHTML +=

`
<option
value="${data.vehicleID}"

data-name="${data.name}"
>

${data.name}
(${data.vehicleID})
</option>
`;

});

}

catch(error){

console.log(error);

}

}

/* =========================
   PLAN CHANGE
========================= */

document.getElementById(
"adminPlan"
).addEventListener(

"change",

function(){

const plan = this.value;

const expiryInput =

document.getElementById(
"adminExpiryDate"
);

const today =
new Date();

/* =========================
   FREE
========================= */

if(plan === "Free"){

expiryInput.disabled =
false;

expiryInput.value = "";

}

/* =========================
   3 MONTHS
========================= */

else if(plan === "3 Months"){

expiryInput.disabled =
true;

const futureDate =

new Date(
today.setDate(
today.getDate() + 90
)
);

expiryInput.value =

futureDate
.toISOString()
.split("T")[0];

}

/* =========================
   6 MONTHS
========================= */

else if(plan === "6 Months"){

expiryInput.disabled =
true;

const futureDate =

new Date(
today.setDate(
today.getDate() + 180
)
);

expiryInput.value =

futureDate
.toISOString()
.split("T")[0];

}

/* =========================
   YEARLY
========================= */

else if(plan === "Yearly"){

expiryInput.disabled =
true;

const futureDate =

new Date(
today.setDate(
today.getDate() + 365
)
);

expiryInput.value =

futureDate
.toISOString()
.split("T")[0];

}

/* =========================
   LIFETIME
========================= */

else if(plan === "Lifetime"){

expiryInput.disabled =
true;

expiryInput.value = "";

}

}

);



/* =========================
   CREATE ADMIN
========================= */

async function createAdmin(){

try{

showLoader();

const userID =

document.getElementById(
"adminUserID"
).value.trim();

const adminName =

document.getElementById(
"adminName"
).value.trim();

const password =

document.getElementById(
"adminPassword"
).value.trim();

const providerName =

document.getElementById(
"providerName"
).value.trim();

const providerID =

document.getElementById(
"providerID"
).value.trim();

const helplineNumber =

document.getElementById(
"helplineNumber"
).value.trim();

const districtSelect =

document.getElementById(
"adminDistrict"
);

const districtOption =

districtSelect.options[
districtSelect.selectedIndex
];

const districtID =

districtSelect.value;

const districtName =

districtOption.getAttribute(
"data-name"
);

const vehicleSelect =

document.getElementById(
"vehicleSelect"
);

const vehicleOption =

vehicleSelect.options[
vehicleSelect.selectedIndex
];

const vehicleID =

vehicleSelect.value;

const vehicleName =

vehicleOption.getAttribute(
"data-name"
);

const email =

userID +
"@clickjabo.com";

const role =
"providerAdmin";

const planType =

document.getElementById(
"adminPlan"
).value;



let expiryDate = null;

const manualExpiryDate =

document.getElementById(
"adminExpiryDate"
).value;

/* =========================
   FREE
========================= */

if(planType === "Free"){

if(manualExpiryDate === ""){

hideLoader();

alert(
"Please select expiry date."
);

return;

}

expiryDate =
new Date(manualExpiryDate);

}

/* =========================
   3 MONTHS
========================= */

else if(planType === "3 Months"){

expiryDate =

new Date(

Date.now() +

90 * 24 * 60 * 60 * 1000

);

}

/* =========================
   6 MONTHS
========================= */

else if(planType === "6 Months"){

expiryDate =

new Date(

Date.now() +

180 * 24 * 60 * 60 * 1000

);

}

/* =========================
   YEARLY
========================= */

else if(planType === "Yearly"){

expiryDate =

new Date(

Date.now() +

365 * 24 * 60 * 60 * 1000

);

}

/* =========================
   LIFETIME
========================= */

else if(planType === "Lifetime"){

expiryDate = null;

}



/* =========================
   VALIDATION
========================= */

if(

userID === "" ||
adminName === "" ||
password === "" ||
providerName === "" ||
providerID === "" ||
districtID === "" ||
vehicleID === ""

){

hideLoader();

alert(
"Please fill all required fields."
);

return;

}

/* =========================
   CREATE AUTH ACCOUNT
========================= */

const userCredential =

await createUserWithEmailAndPassword(

auth,
email,
password

);

const user =
userCredential.user;

/* =========================
   SAVE ADMIN
========================= */

await setDoc(

doc(
db,
"districtAdmins",
user.uid
),

{

name:
adminName,

userID:
userID,

email:
email,

providerID:
providerID,

providerName:
providerName,

districtID:
districtID,

districtName:
districtName,

vehicleID:
vehicleID,

vehicleName:
vehicleName,

helplineNumber:
helplineNumber,

role:
role,

planType:
planType,

expiryDate:
expiryDate,

isActive:true,

lastLoginAt:null,

createdAt:
serverTimestamp(),

updatedAt:
serverTimestamp()

}

);

/* =========================
   SAVE PROVIDER
========================= */

await setDoc(

doc(
db,
"providers",
providerID
),

{

providerID:
providerID,

name:
providerName,

districtID:
districtID,

districtName:
districtName,

vehicleID:
vehicleID,

vehicleName:
vehicleName,

helplineNumber:
helplineNumber,

isActive:true,

createdAt:
serverTimestamp(),

updatedAt:
serverTimestamp()

},

{

merge:true

}

);

hideLoader();

alert(
"Provider Admin created successfully."
);

/* =========================
   RESET
========================= */

document.getElementById(
"adminUserID"
).value = "";

document.getElementById(
"adminName"
).value = "";

document.getElementById(
"adminPassword"
).value = "";

document.getElementById(
"providerName"
).value = "";

document.getElementById(
"providerID"
).value = "";

document.getElementById(
"helplineNumber"
).value = "";

document.getElementById(
"adminDistrict"
).value = "";

document.getElementById(
"vehicleSelect"
).value = "";

document.getElementById(
"adminPlan"
).value =

"Free";

}

catch(error){

hideLoader();

console.log(error);

alert(
error.message
);

}

}


/* =========================
   CLEAR FORM
========================= */

function clearAdminForm(){

window.editingAdminID =
null;

/* =========================
   RESET VALUES
========================= */

document.getElementById(
"adminUserID"
).value = "";

document.getElementById(
"adminName"
).value = "";

document.getElementById(
"adminPassword"
).value = "";

document.getElementById(
"providerName"
).value = "";

document.getElementById(
"providerID"
).value = "";

document.getElementById(
"helplineNumber"
).value = "";

document.getElementById(
"adminDistrict"
).value = "";

document.getElementById(
"vehicleSelect"
).value = "";

document.getElementById(
"adminPlan"
).value =

"Free";

document.getElementById(
"adminExpiryDate"
).value = "";

/* =========================
   ENABLE LOCKED FIELDS
========================= */

document.getElementById(
"providerID"
).disabled = false;

document.getElementById(
"adminUserID"
).disabled = false;

/* =========================
   RESET BUTTON
========================= */

document.querySelector(
".create-btn"
).innerText =

"Create Admin";

}

window.clearAdminForm =
clearAdminForm;



window.createAdmin =
createAdmin;

function loadAdmins(){

onSnapshot(

collection(
db,
"districtAdmins"
),

(snapshot)=>{

const activeAdminList =

document.getElementById(
"activeAdminList"
);

const disabledAdminList =

document.getElementById(
"disabledAdminList"
);

activeAdminList.innerHTML = "";
disabledAdminList.innerHTML = "";

let activeCount = 0;
let disabledCount = 0;

snapshot.forEach(docSnap => {

const data =
docSnap.data();

const cardHTML = `


<div
class="admin-item"

ondblclick="
openAdminDetails(
'${data.providerName || ""}',
'${data.userID || ""}',
'${data.districtName || ""}',
'${data.vehicleName || ""}',
'${data.planType || ""}',
'${data.helplineNumber || ""}',
'${data.isActive}'
)
"


style="
border:1px solid
${data.isActive
? "rgba(34,197,94,.28)"
: "rgba(220,38,38,.24)"
};

background:
${data.isActive
? "rgba(34,197,94,.04)"
: "rgba(220,38,38,.03)"
};
"

>

<div class="admin-left">

<div
style="
display:flex;
align-items:center;
gap:10px;
flex-wrap:wrap;
"
>

<div class="admin-email">

${data.providerName || "-"}

</div>

<div
style="
padding:5px 10px;
border-radius:999px;
font-size:10px;
font-weight:700;
letter-spacing:.5px;

background:
${data.isActive
? "rgba(34,197,94,.14)"
: "rgba(220,38,38,.14)"
};

color:
${data.isActive
? "#86efac"
: "#fca5a5"
};

border:1px solid
${data.isActive
? "rgba(34,197,94,.24)"
: "rgba(220,38,38,.24)"
};
"
>

${data.isActive
? "ACTIVE"
: "DISABLED"}

</div>

</div>

<div class="admin-meta">

${data.userID || "-"}

•

${data.districtName || "-"}

•

${data.vehicleName || "-"}

•

${data.planType || "-"}

</div>

</div>

<div class="action-wrap">

<button
class="action-btn edit-btn"

onclick="
editAdmin(
'${docSnap.id}'
)
"
>

Edit

</button>

<button
class="action-btn
${data.isActive
? "disable-btn"
: "enable-btn"}"

onclick="
toggleAdminStatus(
'${docSnap.id}',
${data.isActive}
)
"
>

${data.isActive
? "Disable"
: "Activate"}

</button>

</div>

</div>

`;

if(data.isActive){

activeCount++;

activeAdminList.innerHTML +=
cardHTML;

}

else{

disabledCount++;

disabledAdminList.innerHTML +=
cardHTML;

}

});

if(activeCount === 0){

activeAdminList.innerHTML =

"No active admins.";

}

if(disabledCount === 0){

disabledAdminList.innerHTML =

"No disabled admins.";

}

}

);

}


/* =========================
   TOGGLE STATUS
========================= */

async function toggleAdminStatus(

id,
currentStatus

){

try{

showLoader();

await setDoc(

doc(
db,
"districtAdmins",
id
),

{

isActive:
!currentStatus,

updatedAt:
serverTimestamp()

},

{

merge:true

}

);

hideLoader();

}

catch(error){

hideLoader();

console.log(error);

alert(
error.message
);

}

}


/* =========================
   EDIT ADMIN
========================= */

async function editAdmin(id){

try{

showLoader();

const snapshot =

await getDocs(

collection(
db,
"districtAdmins"
)

);

snapshot.forEach(docSnap => {

if(docSnap.id === id){

const data =
docSnap.data();

/* =========================
   STORE EDIT ID
========================= */

window.editingAdminID =
id;

/* =========================
   FILL FORM
========================= */

document.getElementById(
"adminUserID"
).value =

data.userID || "";

document.getElementById(
"adminName"
).value =
