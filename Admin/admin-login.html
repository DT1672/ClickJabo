<!DOCTYPE html>
<html>

<head>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
ClickJabo Admin
</title>

<link
rel="stylesheet"
href="admin.css">

</head>

<body>

<!-- LOGIN CONTAINER -->

<div class="login-container">

  <!-- LOGIN CARD -->

  <div class="login-card">

    <!-- LOGO -->


<div class="login-logo">

  <img
  src="icon.png"
  alt="ClickJabo Logo">

</div>



    <!-- TITLE -->

    <h1>
      ClickJabo
    </h1>

    <p class="sub-text">

      DISTRICT ADMIN ACCESS

    </p>

    <!-- FORM -->

    <div class="login-form">

      
<label>
  User ID
</label>

<input
type="text"
id="adminEmail"
placeholder="Enter user ID"
autocomplete="off">

      <label>
        Password
      </label>

      <input
      type="password"
      id="adminPassword"
      placeholder="Enter password"
      autocomplete="off">

      <button
      id="loginBtn"
      onclick="loginAdmin()">

        Login

      </button>

    </div>

    <!-- FOOTER -->

    <div class="login-footer">

      Secure District Control Panel

    </div>

  </div>

</div>

<script type="module">

import {
  auth
}
from "../firebase-config.js";

import {
  signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/12.3.0/firebase-auth.js";

async function loginAdmin(){

  const email =
  document.getElementById(
    "adminEmail"
  ).value.trim();

  const password =
  document.getElementById(
    "adminPassword"
  ).value.trim();

  const loginBtn =
  document.getElementById(
    "loginBtn"
  );

  if(
    email === "" ||
    password === ""
  ){

    alert(
      "Please enter email and password."
    );

    return;

  }

  loginBtn.innerText =
  "Please wait...";

  loginBtn.disabled =
  true;

  try{

    await signInWithEmailAndPassword(

      auth,
      email,
      password

    );

    window.location.href =
    "admin-dashboard.html";

  }

  catch(error){

    alert(
      "Invalid email or password."
    );

    console.log(
      error
    );

    loginBtn.innerText =
    "Login";

    loginBtn.disabled =
    false;

  }

}

window.loginAdmin =
loginAdmin;

</script>

</body>

</html>
