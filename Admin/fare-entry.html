<!DOCTYPE html>
<html>

<head>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Fare Entry
</title>

<link
rel="stylesheet"
href="admin.css">

<style>

.form-input{

  padding:11px 12px !important;

  font-size:12px !important;

  border-radius:14px !important;

}

</style>

<script
type="module"
src="auth-check.js">
</script>

</head>

<body
style="
overflow-y:auto;
overflow-x:hidden;
">
<!-- TOP BAR -->

<div
class="top-bar"
style="
display:flex;
align-items:center;
justify-content:flex-start;
position:fixed;
top:0;
left:0;
width:100%;
height:64px;
padding:0 16px;
z-index:2000;
background:rgba(10,15,25,.75);
backdrop-filter:blur(18px);
box-sizing:border-box;
">

 <button
class="back-btn"
onclick="window.location.href='admin-dashboard.html'"
style="
display:flex;
align-items:center;
justify-content:center;
position:absolute;
left:16px;
width:38px;
height:38px;
border:none;
border-radius:14px;
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.08);
color:white;
font-size:18px;
backdrop-filter:blur(12px);
cursor:pointer;
">

  ←

</button>

</div>

<!-- MAIN -->

<div class="dashboard-container"
style="
overflow-y:auto;
overflow-x:hidden;
padding:88px 12px 100px 12px;
">

<!-- HEADER -->

<div class="dashboard-header"
style="
margin-top:8px;
text-align:center;
">

  <h1
  style="
  font-size:22px;
  margin-top:10px;
  margin-bottom:6px;
  ">

    Fare Entry

  </h1>

  <p
  style="
  font-size:9px;
  letter-spacing:2px;
  margin-top:18px;
  ">

    DISTRICT ROUTE MANAGEMENT

  </p>

  <div
  class="district-badge"
  style="
  margin-top:4px;
  padding:5px 12px;
  font-size:9px;
  ">

    DIMAPUR DISTRICT

  </div>

</div>

  <!-- FORM SECTION -->

  <div class="route-section"
  style="
  overflow:visible;
  flex:none;
  ">

    <div class="route-list">

      <div class="route-item"
      style="
      flex-direction:column;
      align-items:stretch;
      gap:10px;
      ">

        <!-- SEARCH -->

        <input
        type="text"
        id="routeSearch"
        placeholder="Search route..."
        class="form-input">

        <div
        id="searchResults"
        class="search-results">

        </div>

        <!-- ADD NEW -->

        <button
        class="edit-btn"
        style="
        width:100%;
        padding:9px 12px;
        font-size:12px;
        margin-top:-22px;
        opacity:.88;
        "
        onclick="clearForm()">

          + Add New Route

        </button>

        <!-- ROUTE DETAILS -->

        <div>

          <div class="route-title"
          style="
          margin-bottom:12px;
          ">

            Route Details

          </div>

          <!-- DISTRICT -->

          <label
          style="
          font-size:11px;
          color:#cbd5e1;
          margin-bottom:4px;
          display:block;
          ">

            District

          </label>

          <select
          id="district"
          style="
          width:100%;
          height:32px;
          padding:0 10px;
          font-size:11px;
          border:none;
          border-radius:12px;
          background:rgba(255,255,255,.06);
          border:1px solid rgba(255,255,255,.08);
          color:white;
          margin-top:4px;
          margin-bottom:8px;
          outline:none;
          appearance:none;
          -webkit-appearance:none;
          -moz-appearance:none;
          ">

            <option value="Dimapur">
              Dimapur
            </option>

            <option value="Kohima">
              Kohima
            </option>

            <option value="Mokokchung">
              Mokokchung
            </option>

          </select>

          <!-- FROM -->

          <label
          style="
          font-size:11px;
          color:#cbd5e1;
          margin-bottom:4px;
          display:block;
          ">

            From

          </label>

          <input
          type="text"
          id="fromLocation"
          placeholder="Enter pickup location"
          class="form-input">

          <!-- TO -->

          <label
          style="
          font-size:11px;
          color:#cbd5e1;
          margin-bottom:4px;
          display:block;
          ">

            To

          </label>

          <input
          type="text"
          id="toLocation"
          placeholder="Enter destination"
          class="form-input">

        </div>

        <!-- FARE DETAILS -->

        <div>

          <div class="route-title"
          style="
          margin-bottom:12px;
          ">

            Fare Details

          </div>

          <!-- HIRE GRID -->

          <div class="fare-grid">

            <div>

              <label
              style="
              font-size:11px;
              color:#cbd5e1;
              margin-bottom:4px;
              display:block;
              ">

                Hire Day

              </label>

              <input
              type="number"
              id="hireDay"
              placeholder="₹ Day"
              class="form-input">

            </div>

            <div>

              <label
              style="
              font-size:11px;
              color:#cbd5e1;
              margin-bottom:4px;
              display:block;
              ">

                Hire Night

              </label>

              <input
              type="number"
              id="hireNight"
              placeholder="₹ Night"
              class="form-input">

            </div>

          </div>

          <!-- SHARED GRID -->

          <div class="fare-grid">

            <div>

              <label
              style="
              font-size:11px;
              color:#cbd5e1;
              margin-bottom:4px;
              display:block;
              ">

                Shared Day

              </label>

              <input
              type="number"
              id="sharedDay"
              placeholder="₹ Day"
              class="form-input">

            </div>

            <div>

              <label
              style="
              font-size:11px;
              color:#cbd5e1;
              margin-bottom:4px;
              display:block;
              ">

                Shared Night

              </label>

              <input
              type="number"
              id="sharedNight"
              placeholder="₹ Night"
              class="form-input">

            </div>

          </div>

        </div>

        <!-- SAVE -->

        <button
        id="saveBtn"
        class="save-btn"
        style="
        width:100%;
        padding:12px;
        font-size:14px;
        "
        onclick="saveFare()">

          Save Fare

        </button>

        <!-- STATUS -->

        <div
        id="editStatus"
        style="
        text-align:center;
        color:#94a3b8;
        font-size:11px;
        ">

          Creating New Route

        </div>

      </div>

    </div>

  </div>

</div>

<script type="module">

import {
  db
}
from "../firebase-config.js";

import {
  collection,
  addDoc,
  updateDoc,
  doc,
  getDocs
}
from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

let editingDocId =
null;

/* =========================
   LOAD EDIT DATA
========================= */

window.onload =
function(){

  const routeData =
  JSON.parse(

    localStorage.getItem(
      "editRoute"
    )

  );

  if(routeData){

    editingDocId =
    routeData.docId;

    document.getElementById(
      "district"
    ).value =
    routeData.district ||
    "Dimapur";

    document.getElementById(
      "fromLocation"
    ).value =
    routeData.from;

    document.getElementById(
      "toLocation"
    ).value =
    routeData.to;

    document.getElementById(
      "hireDay"
    ).value =
    routeData.hireDay;

    document.getElementById(
      "hireNight"
    ).value =
    routeData.hireNight;

    document.getElementById(
      "sharedDay"
    ).value =
    routeData.sharedDay;

    document.getElementById(
      "sharedNight"
    ).value =
    routeData.sharedNight;

    document.getElementById(
      "editStatus"
    ).innerHTML =
    "Editing Existing Route";

    document.getElementById(
      "saveBtn"
    ).innerHTML =
    "Update Fare";

  }

};

/* =========================
   SAVE
========================= */

async function saveFare(){

  const district =
  document.getElementById(
    "district"
  ).value;

  const from =
  document.getElementById(
    "fromLocation"
  ).value.trim();

  const to =
  document.getElementById(
    "toLocation"
  ).value.trim();

  const hireDay =
  document.getElementById(
    "hireDay"
  ).value;

  const hireNight =
  document.getElementById(
    "hireNight"
  ).value;

  const sharedDay =
  document.getElementById(
    "sharedDay"
  ).value;

  const sharedNight =
  document.getElementById(
    "sharedNight"
  ).value;

  if(

    from === "" ||
    to === "" ||
    hireDay === "" ||
    hireNight === "" ||
    sharedDay === "" ||
    sharedNight === ""

  ){

    alert(
      "Please fill all fields."
    );

    return;

  }

  if(from === to){

    alert(
      "Pickup and destination cannot be same."
    );

    return;

  }

  const saveBtn =
  document.getElementById(
    "saveBtn"
  );

  saveBtn.innerHTML =
  "Please wait...";

  saveBtn.disabled =
  true;

  try{

    if(editingDocId){

      await updateDoc(

        doc(
          db,
          "routes",
          editingDocId
        ),

        {

          district,
          from,
          to,
          hireDay,
          hireNight,
          sharedDay,
          sharedNight

        }

      );

      alert(
        "Route updated successfully."
      );

    }

    else{

      await addDoc(

        collection(
          db,
          "routes"
        ),

        {

          district,
          from,
          to,
          hireDay,
          hireNight,
          sharedDay,
          sharedNight

        }

      );

      alert(
        "Route added successfully."
      );

    }

    clearForm();

  }

  catch(error){

    console.log(
      error
    );

    alert(
      "Unable to save route."
    );

  }

  saveBtn.innerHTML =
  "Save Fare";

  saveBtn.disabled =
  false;

}

window.saveFare =
saveFare;

/* =========================
   CLEAR FORM
========================= */

function clearForm(){

  editingDocId =
  null;

  document.getElementById(
    "district"
  ).value =
  "Dimapur";

  document.getElementById(
    "fromLocation"
  ).value =
  "";

  document.getElementById(
    "toLocation"
  ).value =
  "";

  document.getElementById(
    "hireDay"
  ).value =
  "";

  document.getElementById(
    "hireNight"
  ).value =
  "";

  document.getElementById(
    "sharedDay"
  ).value =
  "";

  document.getElementById(
    "sharedNight"
  ).value =
  "";

  document.getElementById(
    "editStatus"
  ).innerHTML =
    "Creating New Route";

  document.getElementById(
    "saveBtn"
  ).innerHTML =
    "Save Fare";

  localStorage.removeItem(
    "editRoute"
  );

}

window.clearForm =
clearForm;

/* =========================
   LIVE ROUTE SEARCH
========================= */

window.addEventListener(

  "DOMContentLoaded",

  function(){

    const routeSearch =
    document.getElementById(
      "routeSearch"
    );

    routeSearch.addEventListener(

      "input",

      async function(){

        const searchText =
        this.value
        .trim()
        .toLowerCase();

        const resultsBox =
        document.getElementById(
          "searchResults"
        );

        resultsBox.innerHTML =
        "";

        if(searchText === ""){

          return;

        }

        const querySnapshot =
        await getDocs(

          collection(
            db,
            "routes"
          )

        );

        querySnapshot.forEach(docSnap => {

          const route =
          docSnap.data();

          const docId =
          docSnap.id;

          const routeText =

          `${route.from} ${route.to}`
          .toLowerCase();

          if(
            routeText.includes(
              searchText
            )
          ){

            const result =
            document.createElement(
              "div"
            );

            result.className =
            "search-result-item";

            result.innerHTML = `

              <strong>
                ${route.from}
                →
                ${route.to}
              </strong>

            `;

            result.onclick =
            function(){

              editingDocId =
              docId;

              document.getElementById(
                "district"
              ).value =
              route.district ||
              "Dimapur";

              document.getElementById(
                "fromLocation"
              ).value =
              route.from;

              document.getElementById(
                "toLocation"
              ).value =
              route.to;

              document.getElementById(
                "hireDay"
              ).value =
              route.hireDay;

              document.getElementById(
                "hireNight"
              ).value =
              route.hireNight;

              document.getElementById(
                "sharedDay"
              ).value =
              route.sharedDay;

              document.getElementById(
                "sharedNight"
              ).value =
              route.sharedNight;

              document.getElementById(
                "editStatus"
              ).innerHTML =
              "Editing Existing Route";

              document.getElementById(
                "saveBtn"
              ).innerHTML =
              "Update Fare";

              resultsBox.innerHTML =
              "";

            };

            resultsBox.appendChild(
              result
            );

          }

        });

      }

    );

  }

);

</script>

</body>

</html>
