<!DOCTYPE html>
<html>

<head>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Admin Settings
</title>

<link
rel="stylesheet"
href="admin.css">

<script
type="module"
src="auth-check.js">
</script>

</head>

<body>

<!-- TOP BAR -->

<div
class="top-bar"
style="
display:flex;
align-items:center;
justify-content:flex-start;
position:fixed;
top:0;
left:0;
width:100%;
height:64px;
padding:0 16px;
z-index:2000;
background:rgba(10,15,25,.75);
backdrop-filter:blur(18px);
box-sizing:border-box;
">

  <button
  class="back-btn"
  onclick="window.location.href='admin-dashboard.html'"
  style="
  display:flex;
  align-items:center;
  justify-content:center;
  width:38px;
  height:38px;
  border:none;
  border-radius:14px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);
  color:white;
  font-size:18px;
  backdrop-filter:blur(12px);
  cursor:pointer;
  ">

    ←

  </button>

</div>

<!-- MAIN -->

<div
class="dashboard-container"
style="
padding:88px 12px 100px 12px;
overflow-y:auto;
overflow-x:hidden;
box-sizing:border-box;
">

  <!-- HEADER -->

  <div
  class="dashboard-header"
  style="
  text-align:center;
  ">

    <h1
    style="
    font-size:22px;
    margin-bottom:6px;
    ">

      Settings

    </h1>

    <p
    style="
    font-size:9px;
    letter-spacing:2px;
    margin-top:4px;
    ">

      DISTRICT CONTROL SETTINGS

    </p>

    <div
    class="district-badge"
    style="
    margin-top:16px;
    padding:5px 12px;
    font-size:9px;
    ">

      DIMAPUR DISTRICT

    </div>

  </div>

  <!-- SETTINGS SECTION -->

  <div
  class="route-section"
  style="
  margin-top:16px;
  ">

    <div class="route-title">

      District Configuration

    </div>

    <div class="route-list">

      <div
      class="route-item"
      style="
      flex-direction:column;
      align-items:stretch;
      gap:10px;
      ">

        <div class="route-info">

          <strong>
            District Helpline
          </strong>

          <p>
            Public complaint and support number
          </p>

        </div>

        <input
        type="text"
        id="helplineNumber"
        placeholder="Enter helpline number"
        autocomplete="off"
        style="
        width:100%;
        padding:11px 12px;
        border:none;
        border-radius:14px;
        background:rgba(255,255,255,.06);
        border:1px solid rgba(255,255,255,.08);
        color:white;
        font-size:12px;
        outline:none;
        box-sizing:border-box;
        ">

        <!-- SAVE BUTTON -->

        <button
        id="saveBtn"
        class="save-settings-btn"
        style="
        width:100%;
        padding:12px;
        border-radius:14px;
        font-size:13px;
        "
        onclick="saveSettings()">

          Save Settings

        </button>

        <!-- LOGOUT BUTTON -->

        <button
        class="logout-btn"
        style="
        width:100%;
        padding:12px;
        border-radius:14px;
        font-size:13px;
        "
        onclick="logoutAdmin()">

          Logout

        </button>

      </div>

    </div>

  </div>

</div>

<script type="module">

import {
  auth,
  db
}
from "../firebase-config.js";

import {
  signOut
}
from "https://www.gstatic.com/firebasejs/12.3.0/firebase-auth.js";

import {
  doc,
  getDoc,
  setDoc
}
from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

/* =========================
   LOAD SETTINGS
========================= */

async function loadSettings(){

  try{

    const settingsDoc =
    await getDoc(

      doc(
        db,
        "settings",
        "Dimapur"
      )

    );

    if(settingsDoc.exists()){

      const settings =
      settingsDoc.data();

      document.getElementById(
        "helplineNumber"
      ).value =

      settings.helpline || "";

    }

  }

  catch(error){

    console.log(error);

  }

}

loadSettings();

/* =========================
   SAVE SETTINGS
========================= */

async function saveSettings(){

  const helpline =
  document.getElementById(
    "helplineNumber"
  ).value.trim();

  if(helpline === ""){

    alert(
      "Please enter helpline number."
    );

    return;

  }

  const saveBtn =
  document.getElementById(
    "saveBtn"
  );

  saveBtn.innerHTML =
  "Please wait...";

  saveBtn.disabled =
  true;

  try{

    await setDoc(

      doc(
        db,
        "settings",
        "Dimapur"
      ),

      {

        helpline:
        helpline

      },

      {

        merge:true

      }

    );

    alert(
      "Settings updated successfully."
    );

  }

  catch(error){

    console.log(error);

    alert(
      "Unable to save settings."
    );

  }

  saveBtn.innerHTML =
  "Save Settings";

  saveBtn.disabled =
  false;

}

window.saveSettings =
saveSettings;

/* =========================
   LOGOUT
========================= */

async function logoutAdmin(){

  const confirmLogout =
  confirm(
    "Logout from admin panel?"
  );

  if(!confirmLogout){

    return;

  }

  try{

    await signOut(
      auth
    );

    window.location.href =
    "admin-login.html";

  }

  catch(error){

    console.log(
      error
    );

    alert(
      "Unable to logout."
    );

  }

}

window.logoutAdmin =
logoutAdmin;

</script>

</body>

</html>
