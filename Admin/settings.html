<!DOCTYPE html>
<html>

<head>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Admin Settings
</title>

<link
rel="stylesheet"
href="admin.css">

<script
type="module"
src="auth-check.js">
</script>

</head>

<body>

<!-- TOP BAR -->

<div class="top-bar">

  <button
  class="back-btn"
  onclick="window.location.href='admin-dashboard.html'">

    ←

  </button>

</div>

<!-- MAIN -->

<div class="dashboard-container">

  <!-- HEADER -->

  <div class="dashboard-header">

    <h1>
      Settings
    </h1>

    <p>
      ADMIN ACCOUNT SETTINGS
    </p>

    <div class="district-badge">

      SECURE ACCESS PANEL

    </div>

  </div>

  <!-- SETTINGS SECTION -->

  <div class="route-section">

    <div class="route-title">

      Account Configuration

    </div>

    <div class="route-list">

      <div class="route-item">

        <div class="route-info">

          <strong>
            Admin Username
          </strong>

          <p>
            District administrator account
          </p>

        </div>

      </div>

      <input
      type="text"
      id="adminUsername"
      value="dimapuradmin"
      autocomplete="off">

      <div class="route-item">

        <div class="route-info">

          <strong>
            Current Password
          </strong>

          <p>
            Verify current account password
          </p>

        </div>

      </div>

      <input
      type="password"
      id="currentPassword"
      placeholder="Enter current password"
      autocomplete="off">

      <div class="route-item">

        <div class="route-info">

          <strong>
            New Password
          </strong>

          <p>
            Create a secure new password
          </p>

        </div>

      </div>

      <input
      type="password"
      id="newPassword"
      placeholder="Enter new password"
      autocomplete="off">

      <div class="route-item">

        <div class="route-info">

          <strong>
            Confirm Password
          </strong>

          <p>
            Re-enter new password
          </p>

        </div>

      </div>

      <input
      type="password"
      id="confirmPassword"
      placeholder="Confirm new password"
      autocomplete="off">

      <!-- SAVE BUTTON -->

      <button
      id="saveBtn"
      class="save-settings-btn"
      onclick="saveSettings()">

        Save Settings

      </button>

      <!-- LOGOUT BUTTON -->

      <button
      class="logout-btn"
      onclick="logoutAdmin()">

        Logout

      </button>

    </div>

  </div>

</div>

<script type="module">

import {
  auth
}
from "../firebase-config.js";

import {
  signOut
}
from "https://www.gstatic.com/firebasejs/12.3.0/firebase-auth.js";

/* =========================
   SAVE SETTINGS
========================= */

function saveSettings(){

  const currentPassword =
  document.getElementById(
    "currentPassword"
  ).value.trim();

  const newPassword =
  document.getElementById(
    "newPassword"
  ).value.trim();

  const confirmPassword =
  document.getElementById(
    "confirmPassword"
  ).value.trim();

  if(

    currentPassword === "" ||
    newPassword === "" ||
    confirmPassword === ""

  ){

    alert(
      "Please fill all fields."
    );

    return;

  }

  if(
    newPassword !==
    confirmPassword
  ){

    alert(
      "New passwords do not match."
    );

    return;

  }

  const saveBtn =
  document.getElementById(
    "saveBtn"
  );

  saveBtn.innerHTML =
  "Please wait...";

  saveBtn.disabled =
  true;

  setTimeout(() => {

    alert(
      "Settings updated successfully."
    );

    document.getElementById(
      "currentPassword"
    ).value = "";

    document.getElementById(
      "newPassword"
    ).value = "";

    document.getElementById(
      "confirmPassword"
    ).value = "";

    saveBtn.innerHTML =
    "Save Settings";

    saveBtn.disabled =
    false;

  },1000);

}

window.saveSettings =
saveSettings;

/* =========================
   LOGOUT
========================= */

async function logoutAdmin(){

  const confirmLogout =
  confirm(
    "Logout from admin panel?"
  );

  if(!confirmLogout){

    return;

  }

  try{

    await signOut(
      auth
    );

    window.location.href =
    "admin-login.html";

  }

  catch(error){

    console.log(
      error
    );

    alert(
      "Unable to logout."
    );

  }

}

window.logoutAdmin =
logoutAdmin;

</script>

</body>

</html>
