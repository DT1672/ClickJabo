
<!DOCTYPE html>
<html>

<head>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Route List
</title>

<link
rel="stylesheet"
href="admin.css">

<script
type="module"
src="auth-check.js">
</script>

</head>

<body>

<!-- TOP BAR -->


<!-- TOP BAR -->

<div class="top-bar">

  <button
  class="back-btn"
  onclick="window.location.href='admin-dashboard.html'">

    ←

  </button>

</div>


<!-- MAIN -->

<div class="dashboard-container">

  <!-- HEADER -->

  <div class="dashboard-header">

    <h1>
      Route List
    </h1>

    <p>
      SEARCH & MANAGE ROUTES
    </p>

    <div class="district-badge">

      DIMAPUR DISTRICT

    </div>

  </div>

  <!-- SEARCH -->

  <input
  type="text"
  id="routeSearch"
  placeholder="Search route...">

  <!-- ROUTE SECTION -->

  <div class="route-section">

    <div class="route-title">

      Available Routes

    </div>

    <div
    id="routeContainer"
    class="route-list">

    </div>

  </div>

</div>

<!-- FLOAT BUTTON -->

<button
class="fab"
onclick="openAddModal()">

  +

</button>

<!-- MODAL -->

<div
id="routeModal"
class="modal">

  <div class="modal-card">

    <h2>
      Add Route
    </h2>

    <input
    type="text"
    id="fromInput"
    placeholder="From Location">

    <input
    type="text"
    id="toInput"
    placeholder="To Location">

    <input
    type="number"
    id="hireDayInput"
    placeholder="Hire Day Fare">

    <input
    type="number"
    id="hireNightInput"
    placeholder="Hire Night Fare">

    <input
    type="number"
    id="sharedDayInput"
    placeholder="Shared Day Fare">

    <input
    type="number"
    id="sharedNightInput"
    placeholder="Shared Night Fare">

    <div class="modal-actions">

      <button
      class="cancel-btn"
      onclick="closeModal()">

        Cancel

      </button>

      <button
      class="save-btn"
      onclick="saveRoute()">

        Save Route

      </button>

    </div>

  </div>

</div>

<script type="module">

import {
  db
}
from "../firebase-config.js";

import {
  collection,
  getDocs,
  deleteDoc,
  doc,
  addDoc
}
from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

/* =========================
   LOAD ROUTES
========================= */

async function loadRoutes(){

  const querySnapshot =
  await getDocs(

    collection(
      db,
      "routes"
    )

  );

  const container =
  document.getElementById(
    "routeContainer"
  );

  container.innerHTML =
  "";

  if(querySnapshot.empty){

    container.innerHTML = `

    <div class="route-item">

      <div class="route-info">

        <strong>
          No Routes Found
        </strong>

        <p>
          Tap + button to add routes
        </p>

      </div>

    </div>

    `;

    return;

  }

  querySnapshot.forEach(docSnap => {

    const route =
    docSnap.data();

    const docId =
    docSnap.id;

    container.innerHTML += `

    <div class="route-item">

      <div class="route-info">

        <strong>
          ${route.from}
          →
          ${route.to}
        </strong>

        <p>
          Hire:
          ₹${route.hireDay}
          /
          ₹${route.hireNight}
        </p>

        <p>
          Shared:
          ₹${route.sharedDay}
          /
          ₹${route.sharedNight}
        </p>

      </div>

      <div class="route-actions">

        <button
        class="edit-btn"
        onclick="
        openEditRoute(
          '${docId}',
          '${route.district || "Dimapur"}',
          '${route.from}',
          '${route.to}',
          '${route.hireDay}',
          '${route.hireNight}',
          '${route.sharedDay}',
          '${route.sharedNight}'
        )
        ">

          Edit

        </button>

        <button
        class="delete-btn"
        onclick="
        deleteRoute(
          '${docId}'
        )
        ">

          Delete

        </button>

      </div>

    </div>

    `;

  });

}

/* =========================
   EDIT
========================= */

function openEditRoute(
  docId,
  district,
  from,
  to,
  hireDay,
  hireNight,
  sharedDay,
  sharedNight
){

  localStorage.setItem(

    "editRoute",

    JSON.stringify({

      docId,
      district,
      from,
      to,
      hireDay,
      hireNight,
      sharedDay,
      sharedNight

    })

  );

  window.location.href =
  "fare-entry.html";

}

window.openEditRoute =
openEditRoute;

/* =========================
   DELETE
========================= */

async function deleteRoute(docId){

  const confirmDelete =
  confirm(
    "Delete this route?"
  );

  if(!confirmDelete){

    return;

  }

  try{

    await deleteDoc(

      doc(
        db,
        "routes",
        docId
      )

    );

    loadRoutes();

  }

  catch(error){

    console.log(
      error
    );

    alert(
      "Unable to delete route."
    );

  }

}

window.deleteRoute =
deleteRoute;

/* =========================
   SEARCH
========================= */

document
.getElementById(
  "routeSearch"
)
.addEventListener(

  "input",

  function(){

    const searchText =
    this.value
    .toLowerCase();

    const routeItems =
    document.querySelectorAll(
      ".route-item"
    );

    routeItems.forEach(item => {

      const routeText =
      item.innerText
      .toLowerCase();

      if(
        routeText.includes(
          searchText
        )
      ){

        item.style.display =
        "flex";

      }

      else{

        item.style.display =
        "none";

      }

    });

  }

);

/* =========================
   MODAL
========================= */

function openAddModal(){

  clearModal();

  document
    .getElementById(
      "routeModal"
    )
    .classList
    .add(
      "active"
    );

}

window.openAddModal =
openAddModal;

function closeModal(){

  document
    .getElementById(
      "routeModal"
    )
    .classList
    .remove(
      "active"
    );

}

window.closeModal =
closeModal;

/* =========================
   CLEAR MODAL
========================= */

function clearModal(){

  document.getElementById(
    "fromInput"
  ).value = "";

  document.getElementById(
    "toInput"
  ).value = "";

  document.getElementById(
    "hireDayInput"
  ).value = "";

  document.getElementById(
    "hireNightInput"
  ).value = "";

  document.getElementById(
    "sharedDayInput"
  ).value = "";

  document.getElementById(
    "sharedNightInput"
  ).value = "";

}

/* =========================
   SAVE ROUTE
========================= */

async function saveRoute(){

  const from =
  document
    .getElementById(
      "fromInput"
    )
    .value
    .trim();

  const to =
  document
    .getElementById(
      "toInput"
    )
    .value
    .trim();

  const hireDay =
  document
    .getElementById(
      "hireDayInput"
    )
    .value;

  const hireNight =
  document
    .getElementById(
      "hireNightInput"
    )
    .value;

  const sharedDay =
  document
    .getElementById(
      "sharedDayInput"
    )
    .value;

  const sharedNight =
  document
    .getElementById(
      "sharedNightInput"
    )
    .value;

  if(

    from === "" ||
    to === "" ||
    hireDay === "" ||
    hireNight === "" ||
    sharedDay === "" ||
    sharedNight === ""

  ){

    alert(
      "Please fill all fields."
    );

    return;

  }

  if(from === to){

    alert(
      "Pickup and destination cannot be same."
    );

    return;

  }

  try{

    await addDoc(

      collection(
        db,
        "routes"
      ),

      {

        district:
        "Dimapur",

        from,
        to,
        hireDay,
        hireNight,
        sharedDay,
        sharedNight

      }

    );

    closeModal();

    loadRoutes();

  }

  catch(error){

    console.log(
      error
    );

    alert(
      "Unable to save route."
    );

  }

}

window.saveRoute =
saveRoute;

/* =========================
   INITIAL LOAD
========================= */

loadRoutes();

</script>

</body>

</html>
