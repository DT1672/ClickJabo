<!DOCTYPE html>
<html>

<head>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Route List
</title>

<link
rel="stylesheet"
href="admin.css">

<script
type="module"
src="auth-check.js">
</script>

</head>

<body>

<!-- TOP BAR -->

<div class="top-bar">

  <button
  class="menu-btn"
  onclick="toggleMenu()">

    ☰

  </button>

  <span class="top-title">

    ClickJabo Admin

  </span>

</div>

<!-- SIDE MENU -->

<div
id="sideMenu"
class="side-menu">

  <a href="admin-dashboard.html">

    Dashboard

  </a>

  <a href="route-list.html">

    Route List

  </a>

  <a href="fare-entry.html">

    Fare Entry

  </a>

  <a href="settings.html">

    Settings

  </a>

  <a href="admin-login.html">

    Logout

  </a>

</div>

<!-- MAIN -->

<div class="dashboard-container">

  <div class="dashboard-header">

    <h1>
      Route List
    </h1>

    <p>
      SEARCH & MANAGE ROUTES
    </p>

  </div>

  <!-- SEARCH -->

  <input
  type="text"
  id="routeSearch"
  placeholder="Search route...">

  <!-- ROUTE LIST -->

  <div
  id="routeContainer"
  class="route-list">

  </div>

</div>

<!-- FLOAT ADD BUTTON -->

<button
class="fab"
onclick="openAddModal()">

  +

</button>

<!-- ADD ROUTE MODAL -->

<div
id="routeModal"
class="modal">

  <div class="modal-card">

    <h2>
      Add Route
    </h2>

    <input
    type="text"
    id="fromInput"
    placeholder="From Location">

    <input
    type="text"
    id="toInput"
    placeholder="To Location">

    <input
    type="number"
    id="hireDayInput"
    placeholder="Hire Day Fare">

    <input
    type="number"
    id="hireNightInput"
    placeholder="Hire Night Fare">

    <input
    type="number"
    id="sharedDayInput"
    placeholder="Shared Day Fare">

    <input
    type="number"
    id="sharedNightInput"
    placeholder="Shared Night Fare">

    <div class="modal-actions">

      <button
      class="cancel-btn"
      onclick="closeModal()">

        Cancel

      </button>

      <button
      class="save-btn"
      onclick="saveRoute()">

        Save Route

      </button>

    </div>

  </div>

</div>

<script type="module">

import {
  db
}
from "../firebase-config.js";

import {
  collection,
  getDocs,
  deleteDoc,
  doc,
  addDoc
}
from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

function toggleMenu(){

  document.getElementById(
    "sideMenu"
  ).classList.toggle(
    "active"
  );

}

window.toggleMenu =
toggleMenu;

/* =========================
   LOAD ROUTES
========================= */

async function loadRoutes(){

  const querySnapshot =
  await getDocs(

    collection(
      db,
      "routes"
    )

  );

  const container =
  document.getElementById(
    "routeContainer"
  );

  container.innerHTML = "";

  querySnapshot.forEach(docSnap => {

    const route =
    docSnap.data();

    const docId =
    docSnap.id;

    container.innerHTML += `

    <div class="route-item">

      <div class="route-info">

        <strong>
          ${route.from}
          →
          ${route.to}
        </strong>

        <p>
          Hire:
          ₹${route.hireDay}
          /
          ₹${route.hireNight}
        </p>

        <p>
          Shared:
          ₹${route.sharedDay}
          /
          ₹${route.sharedNight}
        </p>

      </div>

      <div class="route-actions">

        <button
        class="edit-btn"
        onclick="
        openEditRoute(
          '${docId}',
          '${route.from}',
          '${route.to}',
          '${route.hireDay}',
          '${route.hireNight}',
          '${route.sharedDay}',
          '${route.sharedNight}'
        )
        ">

          Edit

        </button>

        <button
        class="delete-btn"
        onclick="
        deleteRoute(
          '${docId}'
        )
        ">

          Delete

        </button>

      </div>

    </div>

    `;

  });

}

/* =========================
   EDIT ROUTE
========================= */

function openEditRoute(
  docId,
  from,
  to,
  hireDay,
  hireNight,
  sharedDay,
  sharedNight
){

  localStorage.setItem(
    "editRoute",
    JSON.stringify({

      docId,
      from,
      to,
      hireDay,
      hireNight,
      sharedDay,
      sharedNight

    })
  );

  window.location.href =
  "fare-entry.html";

}

window.openEditRoute =
openEditRoute;

/* =========================
   DELETE ROUTE
========================= */

async function deleteRoute(docId){

  const confirmDelete =
  confirm(
    "Delete this route?"
  );

  if(!confirmDelete){

    return;

  }

  try{

    await deleteDoc(

      doc(
        db,
        "routes",
        docId
      )

    );

    alert(
      "Route deleted successfully."
    );

    loadRoutes();

  }

  catch(error){

    console.log(
      error
    );

  }

}

window.deleteRoute =
deleteRoute;

/* =========================
   SEARCH
========================= */

document.getElementById(
  "routeSearch"
).addEventListener(
  "input",

  function(){

    const searchText =
    this.value.toLowerCase();

    const routeItems =
    document.querySelectorAll(
      ".route-item"
    );

    routeItems.forEach(item => {

      const routeText =
      item.innerText.toLowerCase();

      if(
        routeText.includes(
          searchText
        )
      ){

        item.style.display =
        "flex";

      }

      else{

        item.style.display =
        "none";

      }

    });

  }
);

/* =========================
   OPEN MODAL
========================= */

function openAddModal(){

  document
    .getElementById(
      "routeModal"
    )
    .classList
    .add(
      "active"
    );

}

window.openAddModal =
openAddModal;

/* =========================
   CLOSE MODAL
========================= */

function closeModal(){

  document
    .getElementById(
      "routeModal"
    )
    .classList
    .remove(
      "active"
    );

}

window.closeModal =
closeModal;

/* =========================
   SAVE ROUTE
========================= */

async function saveRoute(){

  const from =
  document.getElementById(
    "fromInput"
  ).value;

  const to =
  document.getElementById(
    "toInput"
  ).value;

  const hireDay =
  document.getElementById(
    "hireDayInput"
  ).value;

  const hireNight =
  document.getElementById(
    "hireNightInput"
  ).value;

  const sharedDay =
  document.getElementById(
    "sharedDayInput"
  ).value;

  const sharedNight =
  document.getElementById(
    "sharedNightInput"
  ).value;

  if(
    !from ||
    !to ||
    !hireDay ||
    !hireNight ||
    !sharedDay ||
    !sharedNight
  ){

    alert(
      "Please fill all fields."
    );

    return;

  }

  try{

    await addDoc(

      collection(
        db,
        "routes"
      ),

      {

        from,
        to,
        hireDay,
        hireNight,
        sharedDay,
        sharedNight

      }

    );

    alert(
      "Route added successfully."
    );

    closeModal();

    loadRoutes();

  }

  catch(error){

    console.log(
      error
    );

    alert(
      "Unable to save route."
    );

  }

}

window.saveRoute =
saveRoute;

/* =========================
   INITIAL LOAD
========================= */

loadRoutes();

</script>

</body>

</html>
```
