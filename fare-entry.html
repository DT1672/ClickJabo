<!DOCTYPE html>
<html>

<head>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta
name="theme-color"
content="#020817">

<title>
Fare Entry
</title>

<link
rel="stylesheet"
href="admin.css">

<link
rel="manifest"
href="admin-manifest.json">

<style>

.form-input{

  padding:11px 12px !important;

  font-size:12px !important;

  border-radius:14px !important;

}

</style>

<script
type="module"
src="auth-check.js">
</script>

</head>

<body
style="
overflow-y:auto;
overflow-x:hidden;
">

<div
id="loadingOverlay"
class="loader-overlay">

  <div
  class="loader-spinner">

  </div>

  <div
  class="loader-text">

    Loading...

  </div>

</div>

<!-- TOP BAR -->

<div
class="top-bar"
style="
display:flex;
align-items:center;
justify-content:flex-start;
position:fixed;
top:0;
left:0;
width:100%;
height:64px;
padding:0 16px;
z-index:2000;
background:rgba(10,15,25,.75);
backdrop-filter:blur(18px);
box-sizing:border-box;
">

<button
class="back-btn"
onclick="window.location.href='admin-dashboard.html'"
style="
display:flex;
align-items:center;
justify-content:center;
position:absolute;
left:16px;
width:38px;
height:38px;
border:none;
border-radius:14px;
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.08);
color:white;
font-size:18px;
backdrop-filter:blur(12px);
cursor:pointer;
">

←

</button>

</div>

<!-- MAIN -->

<div
class="dashboard-container"
style="
overflow-y:auto;
overflow-x:hidden;
padding:88px 12px 100px 12px;
">

<!-- HEADER -->

<div class="dashboard-header"
style="
margin-top:8px;
text-align:center;
">

<h1
style="
font-size:22px;
margin-top:10px;
margin-bottom:6px;
">

Fare Entry

</h1>

<p
style="
font-size:9px;
letter-spacing:2px;
margin-top:18px;
">

DISTRICT ROUTE MANAGEMENT

</p>

<div
class="district-badge"
style="
margin-top:4px;
padding:5px 12px;
font-size:9px;
">

N/A DISTRICT

</div>

</div>

<!-- FORM SECTION -->

<div class="route-section"
style="
overflow:visible;
flex:none;
">

<div class="route-list">

<div class="route-item"
style="
flex-direction:column;
align-items:stretch;
gap:10px;
">

<!-- SEARCH -->

<input
type="text"
id="routeSearch"
placeholder="Search route..."
class="form-input">

<div
id="searchResults"
class="search-results">

</div>

<!-- ADD NEW -->

<button
class="edit-btn"
style="
width:100%;
padding:9px 12px;
font-size:12px;
margin-top:-22px;
opacity:.88;
"
onclick="clearForm()">

+ Add New Route

</button>

<!-- ROUTE DETAILS -->

<div>

<div class="route-title"
style="
margin-bottom:12px;
">

Route Details

</div>

<!-- DISTRICT -->

<input
type="text"
id="district"
readonly
style="
width:100%;
height:32px;
padding:0 10px;
font-size:11px;
border:none;
border-radius:12px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.06);
color:#94a3b8;
margin-top:4px;
margin-bottom:8px;
outline:none;
box-sizing:border-box;
cursor:not-allowed;
">

<!-- FROM -->

<label
style="
font-size:11px;
color:#cbd5e1;
margin-bottom:4px;
display:block;
">

From

</label>

<input
type="text"
id="fromLocation"
placeholder="Enter pickup location"
class="form-input">

<!-- TO -->

<label
style="
font-size:11px;
color:#cbd5e1;
margin-bottom:4px;
display:block;
">

To

</label>

<input
type="text"
id="toLocation"
placeholder="Enter destination"
class="form-input">

</div>

<!-- FARE DETAILS -->

<div>

<div class="route-title"
style="
margin-bottom:12px;
">

Fare Details

</div>

<div class="fare-grid">

<div>

<label
style="
font-size:11px;
color:#cbd5e1;
margin-bottom:4px;
display:block;
">

Hire Day

</label>

<input
type="number"
id="hireDay"
placeholder="₹ Day"
class="form-input">

</div>

<div>

<label
style="
font-size:11px;
color:#cbd5e1;
margin-bottom:4px;
display:block;
">

Hire Night

</label>

<input
type="number"
id="hireNight"
placeholder="₹ Night"
class="form-input">

</div>

</div>

<div class="fare-grid">

<div>

<label
style="
font-size:11px;
color:#cbd5e1;
margin-bottom:4px;
display:block;
">

Shared Day

</label>

<input
type="number"
id="sharedDay"
placeholder="₹ Day"
class="form-input">

</div>

<div>

<label
style="
font-size:11px;
color:#cbd5e1;
margin-bottom:4px;
display:block;
">

Shared Night

</label>

<input
type="number"
id="sharedNight"
placeholder="₹ Night"
class="form-input">

</div>

</div>

</div>

<!-- SAVE -->

<button
id="saveBtn"
class="save-btn"
style="
width:100%;
padding:12px;
font-size:14px;
"
onclick="saveFare()">

Save Fare

</button>

<!-- STATUS -->

<div
id="editStatus"
style="
text-align:center;
color:#94a3b8;
font-size:11px;
">

Creating New Route

</div>

</div>

</div>

</div>

</div>

<script type="module">

function showLoader(){

document.getElementById(
"loadingOverlay"
).style.display =
"flex";

}

function hideLoader(){

document.getElementById(
"loadingOverlay"
).style.display =
"none";

}

import {
db
}
from "./firebase-config.js";

import {

getAdminSession

}
from "./shared-config.js";

import {

collection,
addDoc,
updateDoc,
doc,
getDocs,
query,
where,
serverTimestamp

}
from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

/* =========================
ADMIN SESSION
========================= */

const adminSession =

getAdminSession();

const adminDistrictID =

adminSession.districtID;

const adminVehicleID =

adminSession.vehicleID;

const adminProviderID =

adminSession.providerID;

/* =========================
UI SESSION INFO
========================= */

document.querySelector(
".district-badge"
).innerHTML =

`${adminDistrictID || "N/A"} DISTRICT`;

document.getElementById(
"district"
).value =

adminDistrictID || "";

/* =========================
GLOBAL
========================= */

let editingDocId =
null;

/* =========================
SAVE
========================= */

async function saveFare(){

showLoader();

const from =
document.getElementById(
"fromLocation"
).value.trim();

const to =
document.getElementById(
"toLocation"
).value.trim();

const hireDay =
document.getElementById(
"hireDay"
).value;

const hireNight =
document.getElementById(
"hireNight"
).value;

const sharedDay =
document.getElementById(
"sharedDay"
).value;

const sharedNight =
document.getElementById(
"sharedNight"
).value;

if(

from === "" ||
to === "" ||
hireDay === "" ||
hireNight === "" ||
sharedDay === "" ||
sharedNight === ""

){

hideLoader();

alert(
"Please fill all fields."
);

return;

}

try{

await addDoc(

collection(
db,
"routes"
),

{

districtID:
adminDistrictID,

vehicleID:
adminVehicleID,

providerID:
adminProviderID,

fromPlace:
from,

toPlace:
to,

hireDayFare:
Number(hireDay),

hireNightFare:
Number(hireNight),

shareDayFare:
Number(sharedDay),

shareNightFare:
Number(sharedNight),

tempHireDay:0,
tempHireNight:0,
tempSharedDay:0,
tempSharedNight:0,

createdAt:
serverTimestamp(),

updatedAt:
serverTimestamp()

}

);

alert(
"Route added successfully."
);

clearForm();

}

catch(error){

console.log(error);

alert(
"Unable to save route."
);

}

hideLoader();

}

window.saveFare =
saveFare;

/* =========================
CLEAR FORM
========================= */

function clearForm(){

document.getElementById(
"fromLocation"
).value =
"";

document.getElementById(
"toLocation"
).value =
"";

document.getElementById(
"hireDay"
).value =
"";

document.getElementById(
"hireNight"
).value =
"";

document.getElementById(
"sharedDay"
).value =
"";

document.getElementById(
"sharedNight"
).value =
"";

}

window.clearForm =
clearForm;

</script>

</body>

</html>
